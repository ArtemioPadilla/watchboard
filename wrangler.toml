# Cloudflare Worker for Watchboard Push Notifications
# Standalone worker at push.watchboard.dev

name = "watchboard-push"
main = "worker/index.ts"
compatibility_date = "2024-09-01"

# Custom domain
routes = [
  { pattern = "push.watchboard.dev", custom_domain = true }
]

# KV namespace binding for push subscriptions
[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "b734903ac07143a5a8d59b7b0021a5e2"

# Cron trigger: poll RSS every 15 minutes for new items to push
[triggers]
crons = ["*/15 * * * *"]

[vars]
VAPID_SUBJECT = "mailto:admin@watchboard.dev"
