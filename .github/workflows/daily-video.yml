name: Daily Intelligence Brief Video

on:
  schedule:
    - cron: '0 0 * * *'  # Midnight UTC = 6 PM CDMX
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/daily-video.yml'

permissions:
  contents: write

jobs:
  video:
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: video/package-lock.json

      - name: Install video dependencies
        run: cd video && npm ci --legacy-peer-deps

      - name: Ensure browser for Remotion
        run: cd video && npx remotion browser ensure

      - name: Render video
        run: cd video && npx tsx render.ts

      # Snapshot the caption RIGHT after the render — before any git pull/rebase
      # can clobber breaking.json. Fix for: caption was reading a stale
      # breaking.json that the rebase reverted to main's older version.
      - name: Snapshot Telegram caption from breaking.json
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DATE="$DATE" node -e "
            function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
            function slugTag(slug){return '#' + slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');}
            function headlineTags(text){
              const STOP = new Set(['The','And','For','With','From','This','That','New','Day','Week','April','March','May','June','July','August','September','October','November','December','January','February','At','In','On','Of','To','By','As','Is','It','Be','Are','An','A','Or','But','If','So','We','You','Our','Their','Its','Has','Have','After','Before','When','While','Where','Why','How','First','Last','Big','Top','Two','Three','Four']);
              const tokens = (text.match(/\b[A-Z][A-Za-z0-9]{1,}(?:\s[A-Z][A-Za-z0-9]+)?\b|\b[A-Z]{2,}\b/g) || [])
                .map(t => t.replace(/\s+/g, ''))
                .filter(t => t.length >= 3 && !STOP.has(t));
              return tokens.map(t => '#' + t);
            }
            const fs = require('fs');
            const date = process.env.DATE;
            try {
              const d = JSON.parse(fs.readFileSync('video/src/data/breaking.json', 'utf8'));
              const lines = d.trackers.map(t => {
                const head = (t.headline || t.name || '').trim();
                return '• <b>' + escapeHtml(t.name) + '</b>: ' + escapeHtml(head);
              }).join('\n');
              const topical = [];
              const seen = new Set();
              for (const t of d.trackers) {
                const tag = slugTag(t.slug);
                if (!seen.has(tag.toLowerCase())) { topical.push(tag); seen.add(tag.toLowerCase()); }
                if (topical.length >= 4) break;
              }
              if (topical.length < 4) {
                const allHeadlines = d.trackers.map(t => t.headline || '').join(' ');
                for (const tag of headlineTags(allHeadlines)) {
                  if (seen.has(tag.toLowerCase())) continue;
                  topical.push(tag); seen.add(tag.toLowerCase());
                  if (topical.length >= 4) break;
                }
              }
              const hashtags = (topical.slice(0, 4).join(' ') + ' #Watchboard').trim();
              const cap = '🔴 <b>Watchboard Daily Brief</b> — ' + date + '\n\n' + lines + '\n\n🔗 watchboard.dev\n\n' + hashtags;
              fs.writeFileSync('/tmp/telegram-caption-breaking.txt', cap);
              console.log('Snapshotted caption (' + cap.length + ' chars)');
            } catch (e) {
              const cap = '🔴 Watchboard Daily Brief — ' + date + '\n\n🔗 watchboard.dev\n\n#Watchboard';
              fs.writeFileSync('/tmp/telegram-caption-breaking.txt', cap);
              console.log('Caption snapshot fell back to minimal — ' + e.message);
            }
          "

      - name: Generate narration with Polly
        continue-on-error: true
        env:
          AWS_REGION: us-east-1
        run: |
          if ! command -v aws &>/dev/null; then
            echo "AWS CLI not available — skipping narration"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          # Extract tracker names from breaking data
          TRACKERS=$(node -e "const d=require('./video/src/data/breaking.json'); console.log(d.trackers.map(t=>t.name).join('. '))")
          
          # English narration
          aws polly synthesize-speech \
            --engine generative \
            --voice-id Matthew \
            --language-code en-US \
            --output-format mp3 \
            --text "Breaking stories on Watchboard today. ${TRACKERS}. Track these and 48 more at watchboard dot dev. Free, open source intelligence dashboards, updated daily by AI." \
            video/output/narration-en.mp3 || echo "Polly EN failed (non-fatal)"

          # Spanish narration  
          aws polly synthesize-speech \
            --engine generative \
            --voice-id Pedro \
            --language-code es-US \
            --output-format mp3 \
            --text "Noticias de última hora en Watchboard hoy. ${TRACKERS}. Rastrea estas y 48 más en watchboard punto dev. Paneles de inteligencia gratuitos y de código abierto, actualizados diariamente por IA." \
            video/output/narration-es.mp3 || echo "Polly ES failed (non-fatal)"

      - name: Merge narration into video
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VIDEO="video/output/watchboard-${DATE}.mp4"
          
          if [ -f video/output/narration-en.mp3 ] && [ -f "$VIDEO" ]; then
            ffmpeg -i "$VIDEO" -i video/output/narration-en.mp3 \
              -filter_complex '[0:a]volume=0.4[music];[1:a]volume=0.9[narr];[music][narr]amix=inputs=2:duration=first[out]' \
              -map 0:v -map '[out]' -c:v copy \
              "video/output/watchboard-${DATE}-narrated-en.mp4" -y || echo "Merge failed"
          fi

          if [ -f video/output/narration-es.mp3 ] && [ -f "$VIDEO" ]; then
            ffmpeg -i "$VIDEO" -i video/output/narration-es.mp3 \
              -filter_complex '[0:a]volume=0.4[music];[1:a]volume=0.9[narr];[music][narr]amix=inputs=2:duration=first[out]' \
              -map 0:v -map '[out]' -c:v copy \
              "video/output/watchboard-${DATE}-narrated-es.mp4" -y || echo "Merge failed"
          fi

      - name: Install root dependencies
        run: npm ci

      - name: Post to social media
        continue-on-error: true
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VIDEO="video/output/watchboard-${DATE}.mp4"
          NARRATED="video/output/watchboard-${DATE}-narrated-en.mp4"
          # Prefer narrated version if available, fall back to base video
          if [ -f "$NARRATED" ]; then
            npx tsx scripts/post-video-social.ts "$NARRATED"
          elif [ -f "$VIDEO" ]; then
            npx tsx scripts/post-video-social.ts "$VIDEO"
          else
            echo "No video file found — skipping social post"
          fi

      - name: Commit social post record
        continue-on-error: true
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f "public/_social/video-post-${DATE}.json" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "public/_social/video-post-${DATE}.json"
            git diff --cached --quiet || git commit -m "chore(social): video post record ${DATE}"
            git push || echo "Push failed (non-fatal)"
          fi

      - name: Append to daily-log.json
        continue-on-error: true
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VIDEO="video/output/watchboard-${DATE}.mp4"
          NARRATED="video/output/watchboard-${DATE}-narrated-en.mp4"
          mkdir -p video/state
          DATE="$DATE" VIDEO="$VIDEO" NARRATED="$NARRATED" RUN_ID="${{ github.run_id }}" node -e "
            const fs = require('fs');
            const path = 'video/state/daily-log.json';
            const date = process.env.DATE;
            let log = [];
            try { log = JSON.parse(fs.readFileSync(path, 'utf8')); } catch {}
            if (!Array.isArray(log)) log = [];
            if (log.some(e => e.date === date)) {
              console.log('Daily log already has entry for ' + date + ' — skipping append');
              process.exit(0);
            }
            const breaking = JSON.parse(fs.readFileSync('video/src/data/breaking.json', 'utf8'));
            const file = process.env.VIDEO;
            const narrated = process.env.NARRATED;
            const fileSize = fs.existsSync(file) ? fs.statSync(file).size : null;
            const narratedSize = fs.existsSync(narrated) ? fs.statSync(narrated).size : null;
            const items = (breaking.trackers || []).map(t => ({
              slug: t.slug,
              name: t.name,
              icon: t.icon,
              headline: t.headline,
              kpiLabel: t.kpiLabel,
              kpiValue: t.kpiValue,
              kpiPrefix: t.kpiPrefix,
              kpiSuffix: t.kpiSuffix,
              sourceTier: t.sourceTier,
              sourceLabel: t.sourceLabel,
              thumbnailUrl: Array.isArray(t.thumbnailUrls) ? t.thumbnailUrls[0] : null,
            }));
            log.push({
              date,
              renderedAt: new Date().toISOString(),
              mode: 'breaking',
              items,
              file: fileSize ? file : null,
              fileSizeMb: fileSize ? +(fileSize / 1024 / 1024).toFixed(2) : null,
              narratedFile: narratedSize ? narrated : null,
              narratedSizeMb: narratedSize ? +(narratedSize / 1024 / 1024).toFixed(2) : null,
              runId: process.env.RUN_ID,
            });
            log.sort((a, b) => b.date.localeCompare(a.date));
            fs.writeFileSync(path, JSON.stringify(log, null, 2) + '\n');
            console.log('Appended ' + date + ' (' + items.length + ' items) to daily-log.json');
          "

      - name: Commit tracker history + daily log
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          changed=0
          for f in video/state/tracker-history.json video/state/daily-log.json; do
            if [ -f "$f" ]; then
              git add "$f"
              changed=1
            fi
          done
          if [ $changed -eq 1 ]; then
            git diff --cached --quiet || git commit -m "chore(video): update tracker history + daily log $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              git rebase --abort || true
              git reset --hard HEAD || true
              sleep 2
            done
          else
            echo "No video state to commit"
          fi

      - name: Upload video artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-video-${{ github.run_id }}
          path: |
            video/output/*.mp4
            video/output/*.mp3
          retention-days: 30

      - name: Summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "## 🎬 Daily Video Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh video/output/*.mp4 2>/dev/null | while read line; do
            echo "- ${line}" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
      - name: Post video to Telegram
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHANNEL_ID != ''
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VIDEO="video/output/watchboard-${DATE}.mp4"
          
          if [ ! -f "$VIDEO" ]; then
            echo "No video file — skipping Telegram"
            exit 0
          fi
          
          # Use the caption snapshot taken right after the render, BEFORE any
          # git pull/rebase could revert breaking.json to an older committed
          # version. This guarantees the caption matches the video on screen.
          if [ -f /tmp/telegram-caption-breaking.txt ]; then
            CAPTION=$(cat /tmp/telegram-caption-breaking.txt)
          else
            CAPTION=$(printf '🔴 Watchboard Daily Brief — %s\n\n🔗 watchboard.dev\n\n#Watchboard' "$DATE")
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" \
            -F "chat_id=${TELEGRAM_CHANNEL_ID}" \
            -F "video=@${VIDEO}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=HTML" \
            -F "supports_streaming=true" \
            && echo "✅ Video posted to Telegram" \
            || echo "⚠️ Telegram video post failed (non-fatal)"

  video-progress:
    name: Daily Progress Video (positive mode)
    runs-on: ubuntu-latest
    needs: video
    if: github.event_name != 'push'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: video/package-lock.json

      - name: Install video dependencies
        run: cd video && npm ci --legacy-peer-deps

      - name: Ensure browser for Remotion
        run: cd video && npx remotion browser ensure

      - name: Render progress video
        run: cd video && npx tsx render.ts --mode positive

      # Snapshot the progress caption immediately, same reason as breaking.
      - name: Snapshot Telegram caption (progress) from breaking.json
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DATE="$DATE" node -e "
            function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
            function slugTag(slug){return '#' + slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('');}
            function headlineTags(text){
              const STOP = new Set(['The','And','For','With','From','This','That','New','Day','Week','April','March','May','June','July','August','September','October','November','December','January','February','At','In','On','Of','To','By','As','Is','It','Be','Are','An','A','Or','But','If','So','We','You','Our','Their','Its','Has','Have','After','Before','When','While','Where','Why','How','First','Last','Big','Top','Two','Three','Four']);
              const tokens = (text.match(/\b[A-Z][A-Za-z0-9]{1,}(?:\s[A-Z][A-Za-z0-9]+)?\b|\b[A-Z]{2,}\b/g) || [])
                .map(t => t.replace(/\s+/g, ''))
                .filter(t => t.length >= 3 && !STOP.has(t));
              return tokens.map(t => '#' + t);
            }
            const fs = require('fs');
            const date = process.env.DATE;
            try {
              const d = JSON.parse(fs.readFileSync('video/src/data/breaking.json', 'utf8'));
              const lines = d.trackers.map(t => {
                const head = (t.headline || t.name || '').trim();
                return '✅ <b>' + escapeHtml(t.name) + '</b>: ' + escapeHtml(head);
              }).join('\n');
              const topical = [];
              const seen = new Set();
              for (const t of d.trackers) {
                const tag = slugTag(t.slug);
                if (!seen.has(tag.toLowerCase())) { topical.push(tag); seen.add(tag.toLowerCase()); }
                if (topical.length >= 4) break;
              }
              if (topical.length < 4) {
                const allHeadlines = d.trackers.map(t => t.headline || '').join(' ');
                for (const tag of headlineTags(allHeadlines)) {
                  if (seen.has(tag.toLowerCase())) continue;
                  topical.push(tag); seen.add(tag.toLowerCase());
                  if (topical.length >= 4) break;
                }
              }
              const hashtags = (topical.slice(0, 4).join(' ') + ' #Watchboard').trim();
              const cap = '🌱 <b>Watchboard Progress Brief</b> — ' + date + '\n\n' + lines + '\n\nScience doesn\\'t take days off.\n🔗 watchboard.dev\n\n' + hashtags;
              fs.writeFileSync('/tmp/telegram-caption-progress.txt', cap);
              console.log('Snapshotted progress caption (' + cap.length + ' chars)');
            } catch (e) {
              const cap = '🌱 Watchboard Progress Brief — ' + date + '\n\n🔗 watchboard.dev\n\n#Watchboard';
              fs.writeFileSync('/tmp/telegram-caption-progress.txt', cap);
              console.log('Progress caption snapshot fell back — ' + e.message);
            }
          "

      - name: Generate narration with Polly (progress tone)
        continue-on-error: true
        env:
          AWS_REGION: us-east-1
        run: |
          if ! command -v aws &>/dev/null; then
            echo "AWS CLI not available — skipping narration"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          TRACKERS=$(node -e "const d=require('./video/src/data/breaking.json'); console.log(d.trackers.map(t=>t.name).join('. '))")

          aws polly synthesize-speech \
            --engine generative \
            --voice-id Joanna \
            --language-code en-US \
            --output-format mp3 \
            --text "Good news from Watchboard today. ${TRACKERS}. Track breakthroughs across science, space, and culture at watchboard dot dev. Free, open source intelligence dashboards." \
            video/output/narration-progress-en.mp3 || echo "Polly EN failed (non-fatal)"

          aws polly synthesize-speech \
            --engine generative \
            --voice-id Lupe \
            --language-code es-US \
            --output-format mp3 \
            --text "Buenas noticias en Watchboard hoy. ${TRACKERS}. Sigue los avances en ciencia, espacio y cultura en watchboard punto dev. Paneles de inteligencia gratuitos y de código abierto." \
            video/output/narration-progress-es.mp3 || echo "Polly ES failed (non-fatal)"

      - name: Merge narration into progress video
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VIDEO="video/output/watchboard-${DATE}-progress.mp4"

          if [ -f video/output/narration-progress-en.mp3 ] && [ -f "$VIDEO" ]; then
            ffmpeg -i "$VIDEO" -i video/output/narration-progress-en.mp3 \
              -filter_complex '[0:a]volume=0.4[music];[1:a]volume=0.9[narr];[music][narr]amix=inputs=2:duration=first[out]' \
              -map 0:v -map '[out]' -c:v copy \
              "video/output/watchboard-${DATE}-progress-narrated-en.mp4" -y || echo "Merge failed"
          fi

      - name: Install root dependencies
        run: npm ci

      - name: Post to social media (progress)
        continue-on-error: true
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          VIDEO_TYPE: progress
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VIDEO="video/output/watchboard-${DATE}-progress.mp4"
          NARRATED="video/output/watchboard-${DATE}-progress-narrated-en.mp4"
          if [ -f "$NARRATED" ]; then
            VIDEO_TYPE=progress npx tsx scripts/post-video-social.ts "$NARRATED"
          elif [ -f "$VIDEO" ]; then
            VIDEO_TYPE=progress npx tsx scripts/post-video-social.ts "$VIDEO"
          else
            echo "No progress video file found — skipping social post"
          fi

      - name: Commit social post record
        continue-on-error: true
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -f "public/_social/video-post-progress-${DATE}.json" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "public/_social/video-post-progress-${DATE}.json"
            git diff --cached --quiet || git commit -m "chore(social): progress video post record ${DATE}"
            git pull --rebase origin main || true
            git push || echo "Push failed (non-fatal)"
          fi

      - name: Upload progress video artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-video-progress-${{ github.run_id }}
          path: |
            video/output/*.mp4
            video/output/*.mp3
          retention-days: 30

      - name: Post progress video to Telegram
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHANNEL_ID != ''
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VIDEO="video/output/watchboard-${DATE}-progress.mp4"
          NARRATED="video/output/watchboard-${DATE}-progress-narrated-en.mp4"
          SEND="$VIDEO"
          [ -f "$NARRATED" ] && SEND="$NARRATED"

          if [ ! -f "$SEND" ]; then
            echo "No progress video file — skipping Telegram"
            exit 0
          fi

          # Use the snapshot taken right after render, before any git pull/rebase
          # could revert breaking.json. Guarantees caption matches the video.
          if [ -f /tmp/telegram-caption-progress.txt ]; then
            CAPTION=$(cat /tmp/telegram-caption-progress.txt)
          else
            CAPTION=$(printf '🌱 Watchboard Progress Brief — %s\n\n🔗 watchboard.dev\n\n#Watchboard' "$DATE")
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" \
            -F "chat_id=${TELEGRAM_CHANNEL_ID}" \
            -F "video=@${SEND}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=HTML" \
            -F "supports_streaming=true" \
            && echo "\u2705 Progress video posted to Telegram" \
            || echo "\u26A0\uFE0F Telegram progress video post failed (non-fatal)"

      - name: Summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "## 🌱 Progress Video Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh video/output/*.mp4 2>/dev/null | while read line; do
            echo "- ${line}" >> $GITHUB_STEP_SUMMARY
          done
