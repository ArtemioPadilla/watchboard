name: Hourly Breaking News Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}  # Keep manual trigger as fallback

concurrency:
  group: hourly-scan
  cancel-in-progress: false  # Don't cancel — runs can take 10+ min with update jobs

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Increased: RSS poll (~10m) + triage (~5m) need more room
    outputs:
      has_actions: ${{ steps.freshness.outputs.has_actions || steps.triage.outputs.has_actions || steps.triage-defaults.outputs.has_actions || 'false' }}
      plan_json: ${{ steps.freshness.outputs.plan_json || steps.triage.outputs.plan_json || steps.triage-defaults.outputs.plan_json || '[]' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci

      - name: Poll news sources
        id: poll
        run: |
          npx tsx scripts/hourly-scan.ts
          if [ -f /tmp/hourly-candidates.json ]; then
            count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/hourly-candidates.json','utf8')).length)")
            echo "candidates=$count" >> "$GITHUB_OUTPUT"
            if [ "$count" -gt 0 ]; then
              echo "has_candidates=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_candidates=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "candidates=0" >> "$GITHUB_OUTPUT"
            echo "has_candidates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set triage defaults
        id: triage-defaults
        if: steps.poll.outputs.has_candidates != 'true'
        run: |
          echo "has_actions=false" >> "$GITHUB_OUTPUT"
          echo "plan_json=[]" >> "$GITHUB_OUTPUT"

      - name: Collect recent events context
        if: steps.poll.outputs.has_candidates == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const cutoff = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000);
            const result = {};
            for (const slug of fs.readdirSync('trackers')) {
              const evDir = path.join('trackers', slug, 'data', 'events');
              if (!fs.existsSync(evDir)) continue;
              const titles = [];
              const files = fs.readdirSync(evDir)
                .filter(f => f.endsWith('.json') && new Date(f.replace('.json','')) >= cutoff)
                .sort().reverse();
              for (const f of files) {
                try {
                  const events = JSON.parse(fs.readFileSync(path.join(evDir, f), 'utf8'));
                  if (!Array.isArray(events)) continue;
                  for (const e of events) { if (e.title) titles.push(e.title); }
                  if (titles.length >= 10) break;
                } catch {}
              }
              if (titles.length > 0) result[slug] = titles.slice(0, 10);
            }
            fs.writeFileSync('/tmp/hourly-context.json', JSON.stringify(result, null, 2));
            console.log('Collected context for ' + Object.keys(result).length + ' trackers');
          "

      - name: Pre-filter candidates
        if: steps.poll.outputs.has_candidates == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const candidates = JSON.parse(fs.readFileSync('/tmp/hourly-candidates.json', 'utf8'));
            const context = JSON.parse(fs.readFileSync('/tmp/hourly-context.json', 'utf8'));

            // Build set of recent titles (lowercase) for dedup
            const recentTitles = new Set();
            for (const titles of Object.values(context)) {
              for (const t of titles) recentTitles.add(t.toLowerCase().trim());
            }

            // Dedup by title similarity and remove already-covered events
            const seen = new Set();
            const filtered = [];
            for (const c of candidates) {
              const titleLower = (c.title || '').toLowerCase().trim();
              // Skip if title matches recent event
              if (recentTitles.has(titleLower)) continue;
              // Skip if we already have a very similar title (first 60 chars)
              const titleKey = titleLower.substring(0, 60);
              if (seen.has(titleKey)) continue;
              seen.add(titleKey);
              // Skip candidates without a matched tracker (unmatched general feed noise)
              // BUT keep them if from a tier-1 source
              filtered.push(c);
            }

            // Sort: matched tracker first, then by timestamp desc
            filtered.sort((a, b) => {
              if (a.matchedTracker && !b.matchedTracker) return -1;
              if (!a.matchedTracker && b.matchedTracker) return 1;
              return (b.timestamp || '').localeCompare(a.timestamp || '');
            });

            // Cap at 30 to keep triage manageable
            const capped = filtered.slice(0, 30);
            fs.writeFileSync('/tmp/hourly-candidates.json', JSON.stringify(capped, null, 2));
            console.log('Pre-filter: ' + candidates.length + ' -> ' + capped.length + ' candidates (removed ' + (candidates.length - capped.length) + ')');
          "

      - name: AI triage
        id: triage-agent
        if: steps.poll.outputs.has_candidates == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 10 --dangerously-skip-permissions --model claude-sonnet-4-6"
          show_full_output: true
          prompt: |
            You are a news triage AI for Watchboard. You have TWO files to read, then write ONE output file. Be efficient — do all reads in your first turn, then write the output.

            STEP 1: Read these two files:
            - /tmp/hourly-candidates.json — array of {title, source, matchedTracker, feedOrigin, url, timestamp}
            - /tmp/hourly-context.json — object of {trackerSlug: [recent event titles]} for dedup

            STEP 2: Classify each candidate:
            - "update" (confidence >= 0.6): Significant new info for an existing tracker.
            - "new_tracker" (confidence >= 0.8): Major breaking event needing a new tracker. Must include suggestedSlug, suggestedDomain, suggestedRegion, suggestedName.
            - "discard": Duplicate, opinion, minor, already covered.

            STEP 3: Write /tmp/hourly-action-plan.json with this EXACT schema:
            {
              "updates": [{"tracker": "slug", "events": [{"summary": "...", "sources": ["url"], "timestamp": "ISO"}]}],
              "newTrackers": [{"suggestedSlug": "...", "suggestedDomain": "...", "suggestedRegion": "...", "suggestedName": "...", "triggerEvent": {"summary": "...", "sources": ["url"], "timestamp": "ISO"}}],
              "scannedAt": "ISO timestamp now",
              "candidateCount": N,
              "discardedCount": N
            }

            Rules: Group updates by tracker. Discard anything matching recent event titles. File MUST be valid JSON.

      - name: Parse triage results
        id: triage
        if: steps.poll.outputs.has_candidates == 'true'
        run: |
          if [ -f /tmp/hourly-action-plan.json ]; then
            node -e "
              const fs = require('fs');
              const plan = JSON.parse(fs.readFileSync('/tmp/hourly-action-plan.json','utf8'));
              const hasActions = plan.updates.length > 0 || plan.newTrackers.length > 0;
              console.log('has_actions=' + hasActions);

              const entries = [];
              for (const u of plan.updates) {
                entries.push({ type: 'update', tracker: u.tracker, data: JSON.stringify(u) });
              }
              for (const nt of plan.newTrackers) {
                entries.push({ type: 'new_tracker', tracker: nt.suggestedSlug, data: JSON.stringify(nt) });
              }
              console.log('plan_json=' + JSON.stringify(entries));
              fs.writeFileSync('/tmp/triage-plan.json', JSON.stringify(entries));
            " >> "$GITHUB_OUTPUT"
          else
            echo "has_actions=false" >> "$GITHUB_OUTPUT"
            echo "plan_json=[]" >> "$GITHUB_OUTPUT"
            echo "[]" > /tmp/triage-plan.json
          fi

      - name: Log discarded candidates (feedback loop)
        if: steps.poll.outputs.has_candidates == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const candidates = JSON.parse(fs.readFileSync('/tmp/hourly-candidates.json', 'utf8'));
            let plan = { updates: [], newTrackers: [], discardedCount: 0 };
            try { plan = JSON.parse(fs.readFileSync('/tmp/hourly-action-plan.json', 'utf8')); } catch {}
            const actedTrackers = new Set([
              ...plan.updates.map(u => u.tracker),
              ...plan.newTrackers.map(n => n.suggestedSlug)
            ]);
            const discarded = candidates.filter(c => !actedTrackers.has(c.matchedTracker));
            const logDir = 'public/_hourly/discarded';
            fs.mkdirSync(logDir, { recursive: true });
            const today = new Date().toISOString().split('T')[0];
            const logFile = logDir + '/' + today + '.json';
            let existing = [];
            try { existing = JSON.parse(fs.readFileSync(logFile, 'utf8')); } catch {}
            existing.push(...discarded.map(c => ({ title: c.title, url: c.url, tracker: c.matchedTracker, ts: new Date().toISOString() })));
            // Keep last 200 entries per day
            fs.writeFileSync(logFile, JSON.stringify(existing.slice(-200), null, 2));
            console.log('Logged ' + discarded.length + ' discarded candidates to ' + logFile);
          " || true

      - name: Freshness check — DISABLED (RSS feeds now cover all trackers)
        id: freshness
        if: false  # Disabled — with full RSS coverage, organic updates replace freshness pings
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const NOW = Date.now();
            const STALE_MS = 36 * 60 * 60 * 1000; // 36 hours

            // Read existing plan (from triage or empty)
            let plan = [];
            try {
              const raw = fs.readFileSync('/tmp/hourly-action-plan.json', 'utf8');
              const parsed = JSON.parse(raw);
              plan = parsed.updates || [];
            } catch {}
            const alreadyTracked = new Set(plan.map(u => u.tracker));

            const staleAdded = [];
            for (const slug of fs.readdirSync('trackers')) {
              const configPath = path.join('trackers', slug, 'tracker.json');
              if (!fs.existsSync(configPath)) continue;
              const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));

              // Only active, non-historical trackers
              if (config.status !== 'active') continue;
              if (config.temporal === 'historical') continue;
              if (alreadyTracked.has(slug)) continue;

              // Check lastUpdated from meta.json
              const metaPath = path.join('trackers', slug, 'data', 'meta.json');
              if (!fs.existsSync(metaPath)) continue;
              const meta = JSON.parse(fs.readFileSync(metaPath, 'utf8'));
              const lastUpdated = meta.lastUpdated ? new Date(meta.lastUpdated).getTime() : 0;
              const ageDays = ((NOW - lastUpdated) / 86400000).toFixed(1);

              if (NOW - lastUpdated > STALE_MS) {
                staleAdded.push(slug);
                console.log('Stale tracker: ' + slug + ' (last updated ' + ageDays + 'd ago)');
              }
            }

            if (staleAdded.length === 0) {
              console.log('No stale trackers found');
              process.exit(0);
            }

            // Read current triage output or parse from GITHUB_OUTPUT
            let hasActions = '${{ steps.triage.outputs.has_actions }}' === 'true';
            let entries = [];
            try {
              const raw = fs.readFileSync('/tmp/triage-plan.json', 'utf8');
              entries = JSON.parse(raw);
            } catch { entries = []; }

            for (const slug of staleAdded) {
              entries.push({ type: 'update', tracker: slug, data: JSON.stringify({
                tracker: slug,
                events: [{ summary: 'Freshness refresh — no updates in 36+ hours', sources: [], timestamp: new Date().toISOString() }]
              })});
            }

            // Write updated outputs
            const outputFile = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(outputFile, 'has_actions=true\n');
            fs.appendFileSync(outputFile, 'plan_json=' + JSON.stringify(entries) + '\n');
            console.log('Added ' + staleAdded.length + ' stale trackers to plan: ' + staleAdded.join(', '));
          "

      - name: Commit state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add public/_hourly/state.json || true
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "chore(hourly): update scan state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              sleep $((RANDOM % 5 + 2))
            done
          fi

      - name: Ensure action plan artifact exists
        if: steps.freshness.outputs.has_actions == 'true' || steps.triage.outputs.has_actions == 'true'
        run: |
          if [ ! -f /tmp/hourly-action-plan.json ]; then
            echo '{"updates":[],"newTrackers":[],"scannedAt":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","candidateCount":0,"discardedCount":0}' > /tmp/hourly-action-plan.json
            echo "Created default hourly-action-plan.json for freshness-only run"
          fi

      - name: Upload action plan
        if: steps.freshness.outputs.has_actions == 'true' || steps.triage.outputs.has_actions == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hourly-action-plan
          path: /tmp/hourly-action-plan.json
          retention-days: 1

  act:
    needs: scan
    if: needs.scan.outputs.has_actions == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(needs.scan.outputs.plan_json) }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: hourly-action-plan
          path: /tmp/

      - name: Prepare schema and config context
        if: matrix.entry.type == 'update'
        run: |
          # Extract relevant schema definitions
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('src/lib/schemas.ts', 'utf8');

            // Extract key type info in condensed form for the AI
            const condensed = \`# Watchboard Schema Reference (condensed)
          # TimelineEventSchema fields:
          #   id: string (kebab-case)
          #   year: string (coerced) — format: \"Mon DD, YYYY\" e.g. \"Apr 13, 2026\"
          #   title: string
          #   type: string
          #   active?: boolean
          #   detail: string
          #   sources: Array<{name: string, tier: 1|2|3|4, url?: string, pole?: \"western\"|\"middle_eastern\"|\"eastern\"|\"international\"}>
          #   media?: Array<{type: \"image\"|\"video\"|\"article\", url: string, caption?: string, source?: string, thumbnail?: string}>
          #   weaponTypes?: Array<\"ballistic\"|\"cruise\"|\"drone\"|\"drone_loitering\"|\"drone_ucav\"|\"drone_recon\"|\"drone_fpv\"|\"rocket\"|\"mixed\"|\"unknown\">
          #   confidence?: \"high\"|\"medium\"|\"low\"
          #   eventConfidence?: \"verified\"|\"official_claim\"|\"disputed\"|\"unverified\"
          #   confidenceReason?: string
          #   lastUpdated?: string

          # MapPointSchema fields:
          #   id: string, lon: number, lat: number, cat: string, label: string, sub: string
          #   tier: 1|2|3|4, date: string (YYYY-MM-DD, no future dates)
          #   base?: boolean, showLabel?: boolean, zoneRadius?: number (positive)
          #   lastUpdated?: string

          # MapLineSchema fields:
          #   id: string, from: [lon,lat], to: [lon,lat], cat: string, label: string
          #   date: string (YYYY-MM-DD, no future dates)
          #   weaponType?: (same enum as above), launched?: int>=0, intercepted?: int>=0
          #   confidence?: \"high\"|\"medium\"|\"low\", time?: string (HH:MM 0:00-23:59)
          #   damage?: string, casualties?: string, notes?: string, platform?: string
          #   status?: \"hit\"|\"intercepted\"|\"partial\"|\"unknown\", lastUpdated?: string
          #   RULE: if cat is \"strike\" or \"retaliation\", weaponType AND time are REQUIRED

          # KpiSchema fields:
          #   id: string, label: string, value: string, color: \"red\"|\"amber\"|\"blue\"|\"green\"
          #   source: string, contested: boolean, contestNote?: string
          #   delta?: string, deltaNote?: string, trend?: \"up\"|\"down\"|\"stable\"
          #   lastUpdated?: string

          # MediaItemSchema fields:
          #   type: \"image\"|\"video\"|\"article\", url: string
          #   caption?: string, source?: string, thumbnail?: string
          \`;
            fs.writeFileSync('/tmp/schemas-condensed.txt', condensed);
            console.log('Wrote condensed schemas (' + condensed.length + ' chars)');
          "

          # Copy tracker config
          TRACKER="${{ matrix.entry.tracker }}"
          cp "trackers/${TRACKER}/tracker.json" /tmp/tracker-config.txt
          echo "Copied tracker config for ${TRACKER}"

      - name: Pre-fetch media thumbnails
        if: matrix.entry.type == 'update'
        env:
          ENTRY_DATA: ${{ matrix.entry.data }}
        run: |
          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');

            const data = JSON.parse(process.env.ENTRY_DATA || '{}');
            const events = data.events || [];
            const results = [];

            for (const event of events) {
              for (const url of (event.sources || [])) {
                try {
                  // Fetch page, follow redirects, timeout 10s
                  const html = execSync(
                    'curl -sL --max-time 10 --max-redirs 5 ' + JSON.stringify(url),
                    { encoding: 'utf8', timeout: 15000 }
                  ).substring(0, 50000); // Cap at 50KB

                  // Extract og:image
                  const ogMatch = html.match(/<meta[^>]+property=[\"']og:image[\"'][^>]+content=[\"']([^\"']+)[\"']/i)
                    || html.match(/<meta[^>]+content=[\"']([^\"']+)[\"'][^>]+property=[\"']og:image[\"']/i);

                  const thumbnail = ogMatch ? ogMatch[1] : null;
                  const sourceName = new URL(url).hostname.replace('www.', '');

                  results.push({
                    url: url,
                    thumbnail: thumbnail || url,
                    source: sourceName,
                    found: !!ogMatch
                  });
                  console.log((ogMatch ? 'Found' : 'No og:image for') + ': ' + url);
                } catch (e) {
                  results.push({ url: url, thumbnail: url, source: 'unknown', found: false });
                  console.log('Failed to fetch: ' + url);
                }
              }
            }

            fs.writeFileSync('/tmp/media-prefetch.json', JSON.stringify(results, null, 2));
            console.log('Pre-fetched media for ' + results.length + ' URLs');
          "

      - name: Update tracker data
        if: matrix.entry.type == 'update'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "github-actions[bot]"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 20 --dangerously-skip-permissions --model claude-sonnet-4-6"
          prompt: |
            You are updating the Watchboard tracker "${{ matrix.entry.tracker }}" with a breaking news event.

            IMPORTANT: If the triage data below says "Freshness refresh" with empty sources [], this is a keepalive — NOT real news. For freshness refreshes:
            - Use media: [] on the event
            - Still update meta.json lastUpdated (keep existing heroHeadline)
            - Events MUST still have ALL required fields: id, year (string like "Apr 13, 2026"), title, type (e.g. "freshness"), detail (e.g. "Automated freshness refresh — no new developments"), sources: []
            - Complete in under 5 turns — be efficient

            SCHEMA REFERENCE (do NOT read schemas.ts or tracker.json — use these directly):
            $(cat /tmp/schemas-condensed.txt)

            TRACKER CONFIG:
            $(cat /tmp/tracker-config.txt)

            TRIAGE DATA:
            ${{ matrix.entry.data }}

            PRE-FETCHED MEDIA (use these directly — do NOT search the web for images):
            $(cat /tmp/media-prefetch.json)

            UPDATE the tracker data files:
            - Create or append to trackers/${{ matrix.entry.tracker }}/data/events/$(date -u +%Y-%m-%d).json
            - Update trackers/${{ matrix.entry.tracker }}/data/map-points.json if event has a location
            - Update trackers/${{ matrix.entry.tracker }}/data/map-lines.json if event involves movement/strike
            - Update trackers/${{ matrix.entry.tracker }}/data/kpis.json if metrics changed
            - Update trackers/${{ matrix.entry.tracker }}/data/meta.json: set heroHeadline and lastUpdated
            - For each event, populate the `media` array using the pre-fetched thumbnails above:
              { "type": "image", "url": "<article-url>", "caption": "<brief description>", "source": "<outlet-name>", "thumbnail": "<from-prefetch>" }

            VALIDATION RULES (MUST follow):
            - year field MUST be a string like "Apr 3, 2026" (NOT a number)
            - Every source object MUST have `name` (string, e.g. "Reuters") and `tier` (1-4). Example: {"name": "Al Jazeera", "tier": 1, "url": "https://...", "pole": "middle_eastern"}
            - source.pole MUST be one of: "western", "middle_eastern", "eastern", "international"
            - All IDs must be unique kebab-case strings
            - NO future dates (today is $(date -u +%Y-%m-%d))
            - If adding map-lines with cat "strike" or "retaliation": weaponType AND time are REQUIRED
            - Map coordinates must be within tracker's coordValidation bounds
            - Merge by ID — never remove existing items, only append
            - Every source MUST include a `url` field with the direct article URL (not a homepage)

            FINALLY: Write the list of new event IDs (one per line) to /tmp/event-ids.txt
            Write the list of sections you modified (one per line) to /tmp/sections.txt

      - name: Generate tweet
        if: matrix.entry.type == 'update'
        env:
          ENTRY_DATA: ${{ matrix.entry.data }}
          TRACKER_SLUG: ${{ matrix.entry.tracker }}
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(process.env.ENTRY_DATA || '{}');
            const tracker = data.tracker || process.env.TRACKER_SLUG;
            const event = (data.events || [])[0] || {};
            const summary = (event.summary || '').substring(0, 200);
            const today = new Date().toISOString().split('T')[0];
            const link = 'https://watchboard.dev/' + tracker + '/?utm_source=x&utm_medium=breaking_hourly&utm_campaign=' + today;
            // t.co wraps links to 23 chars, hashtag ~15, leaves ~240 for summary
            const tweet = summary.substring(0, 230) + '\n\n' + link + '\n#Watchboard';
            fs.writeFileSync('/tmp/tweet-text.txt', tweet);
            console.log('Tweet generated: ' + tweet.length + ' chars');
          "

      - name: Write digest entry
        if: matrix.entry.type == 'update'
        env:
          ENTRY_DATA: ${{ matrix.entry.data }}
          TRACKER_SLUG: ${{ matrix.entry.tracker }}
        run: |
          node -e "
            const fs = require('fs');
            const tracker = process.env.TRACKER_SLUG;
            const data = JSON.parse(process.env.ENTRY_DATA || '{}');
            const digestPath = 'trackers/' + tracker + '/data/digests.json';
            let digests = [];
            try { digests = JSON.parse(fs.readFileSync(digestPath, 'utf8')); } catch {}
            const today = new Date().toISOString().split('T')[0];
            const existing = digests.findIndex(d => d.source === 'breaking' && d.date === today);
            const event = (data.events || [])[0] || {};
            const entry = {
              date: today,
              title: 'Breaking: ' + (event.summary || '').substring(0, 80),
              summary: (event.summary || '').substring(0, 200),
              sectionsUpdated: ['events', 'meta'],
              source: 'breaking'
            };
            if (existing >= 0) { digests[existing] = entry; } else { digests.unshift(entry); }
            fs.writeFileSync(digestPath, JSON.stringify(digests, null, 2));
            console.log('Digest updated for ' + tracker);
          "

      - name: Post breaking tweet
        if: matrix.entry.type == 'update'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          TRACKER_SLUG: ${{ matrix.entry.tracker }}
        run: |
          if [ -f /tmp/tweet-text.txt ]; then
            export TWEET_TEXT=$(cat /tmp/tweet-text.txt)
            EVENT_IDS=$(cat /tmp/event-ids.txt 2>/dev/null | tr '\n' ',' | sed 's/,$//')
            SECTIONS=$(cat /tmp/sections.txt 2>/dev/null | tr '\n' ',' | sed 's/,$//')
            export EVENT_IDS SECTIONS

            npx tsx -e "
              import { postBreaking } from './scripts/hourly-post.js';
              postBreaking(
                process.env.TRACKER_SLUG!,
                process.env.TWEET_TEXT!,
                process.env.EVENT_IDS!.split(',').filter(Boolean),
                process.env.SECTIONS!.split(',').filter(Boolean),
              ).then(u => console.log('[act] Posted:', JSON.stringify(u)))
               .catch(e => console.error('[act] Post failed:', e));
            "
          fi

      - name: Create new tracker
        if: matrix.entry.type == 'new_tracker'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "github-actions[bot]"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 35 --dangerously-skip-permissions --model claude-sonnet-4-6"
          prompt: |
            You are creating a new Watchboard tracker based on a breaking news event.

            STEP 1: Study the system:
            - Read src/lib/tracker-config.ts for TrackerConfigSchema
            - Read src/lib/schemas.ts for data schemas
            - Read one existing tracker as a template (pick one matching the domain below)

            STEP 2: Here is the new tracker specification:
            ${{ matrix.entry.data }}

            STEP 3: Create trackers/${{ matrix.entry.tracker }}/tracker.json with:
            - slug: "${{ matrix.entry.tracker }}"
            - status: "active", temporal: "live"
            - Appropriate domain, region, country from the spec
            - startDate: today $(date -u +%Y-%m-%d)
            - sections: [hero, kpis, timeline, map, claims, political]
            - Map bounds derived from the event's geographic region (use real coordinates)
            - 3-4 map categories relevant to the topic
            - Globe: enabled with 4-5 camera presets at real locations
            - AI config with searchContext from the trigger event
            - updateIntervalDays: 1
            - backfillTargets: {timeline: 10, mapPoints: 5, claims: 5, political: 5}

            STEP 4: Create trackers/${{ matrix.entry.tracker }}/data/ with:
            - meta.json: populated with trigger event info
            - events/$(date -u +%Y-%m-%d).json: the trigger event as first entry
              IMPORTANT: The trigger event MUST include a `media` array with at least 1 item:
              { "type": "image", "url": "<article-url>", "caption": "<description>", "source": "<outlet>", "thumbnail": "<direct-image-url>" }
              Search for a news article covering this event and extract the og:image or hero image URL for the thumbnail.
            - map-points.json: event location (if known)
            - Empty arrays: kpis.json, timeline.json, map-lines.json, claims.json, political.json,
              casualties.json, econ.json, strike-targets.json, retaliation.json, assets.json, digests.json
            - update-log.json: {lastRun: "$(date -u +%Y-%m-%dT%H:%M:%SZ)", sections: {}}

            STEP 5: Validate:
            - Read back tracker.json and verify it's valid JSON
            - Run: npx tsx -e "import {TrackerConfigSchema} from './src/lib/tracker-config.js'; import {readFileSync} from 'fs'; const c = JSON.parse(readFileSync('trackers/${{ matrix.entry.tracker }}/tracker.json','utf8')); TrackerConfigSchema.parse(c); console.log('Config valid')"

            STEP 6: Decide if historical seeding is needed:
            - If this is a sudden event (earthquake, attack, etc.) write "false" to /tmp/should-seed.txt
            - If this is an ongoing situation with history write "true" to /tmp/should-seed.txt

      - name: Post new tracker tweet
        if: matrix.entry.type == 'new_tracker'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          TRACKER_SLUG: ${{ matrix.entry.tracker }}
          ENTRY_DATA: ${{ matrix.entry.data }}
        run: |
          SHOULD_SEED=$(cat /tmp/should-seed.txt 2>/dev/null || echo "false")
          export SHOULD_SEED

          npx tsx -e "
            const data = JSON.parse(process.env.ENTRY_DATA!);
            import { postNewTracker } from './scripts/hourly-post.js';
            postNewTracker(
              process.env.TRACKER_SLUG!,
              data.suggestedName,
              data.triggerEvent.summary,
              process.env.SHOULD_SEED === 'true',
            ).then(u => console.log('[act] Posted new tracker:', JSON.stringify(u)))
             .catch(e => console.error('[act] Post failed:', e));
          "

      - name: Trigger seed job
        if: matrix.entry.type == 'new_tracker'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRACKER_SLUG: ${{ matrix.entry.tracker }}
        run: |
          SHOULD_SEED=$(cat /tmp/should-seed.txt 2>/dev/null || echo "false")
          if [ "$SHOULD_SEED" = "true" ]; then
            gh workflow run seed-tracker.yml \
              -f tracker_slug="$TRACKER_SLUG" \
              -f sections="all"
            echo "Seed job triggered for $TRACKER_SLUG"
          fi

      - name: Validate modified JSON
        id: validate-json
        run: |
          TRACKER="${{ matrix.entry.tracker }}"
          VALID=true
          for f in trackers/$TRACKER/data/*.json trackers/$TRACKER/data/events/*.json; do
            [ -f "$f" ] || continue
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null || {
              echo "INVALID JSON: $f"
              VALID=false
            }
          done
          if [ "$VALID" = "false" ]; then
            echo "::error::JSON validation failed for $TRACKER"
            exit 1
          fi

          npx tsx -e "
            import {TimelineEventSchema} from './src/lib/schemas.js';
            import {readdirSync, readFileSync, writeFileSync} from 'fs';
            const dir = 'trackers/$TRACKER/data/events';
            let fixed = 0;
            try {
              for (const f of readdirSync(dir)) {
                if (!f.endsWith('.json')) continue;
                const path = dir + '/' + f;
                const events = JSON.parse(readFileSync(path, 'utf8'));
                const arr = Array.isArray(events) ? events : [events];
                let modified = false;
                for (const e of arr) {
                  // Auto-fix common missing fields before validation
                  if (e.sources) {
                    for (const s of e.sources) {
                      if (!s.name) { s.name = s.url ? new URL(s.url).hostname.replace('www.','') : 'Unknown'; modified = true; fixed++; }
                      if (!s.tier) { s.tier = 2; modified = true; fixed++; }
                      if (!s.pole) { s.pole = 'international'; modified = true; fixed++; }
                    }
                  }
                  if (!e.type) { e.type = 'update'; modified = true; fixed++; }
                  if (!e.detail) { e.detail = e.title || 'No detail provided'; modified = true; fixed++; }
                  if (!e.media) { e.media = []; modified = true; fixed++; }
                  // Fix invalid enum values
                  const validConfidence = ['high','medium','low'];
                  const validEventConf = ['verified','official_claim','disputed','unverified'];
                  if (e.confidence && !validConfidence.includes(e.confidence)) { e.confidence = 'medium'; modified = true; fixed++; }
                  if (e.eventConfidence && !validEventConf.includes(e.eventConfidence)) {
                    // Map common mistakes
                    const map: Record<string,string> = {confirmed:'verified', high:'verified', low:'unverified', medium:'official_claim'};
                    e.eventConfidence = map[e.eventConfidence] || 'verified'; modified = true; fixed++;
                  }
                  // Validate after fixes
                  TimelineEventSchema.parse(e);
                }
                if (modified) writeFileSync(path, JSON.stringify(arr, null, 2));
              }
              console.log('Zod validation passed' + (fixed > 0 ? ' (auto-fixed ' + fixed + ' fields)' : ''));
            } catch(e: any) { console.error('Zod error (after auto-fix attempt):', e.message); process.exit(1); }
          "

      - name: Update update-log
        run: |
          TRACKER="${{ matrix.entry.tracker }}"
          LOG_FILE="trackers/$TRACKER/data/update-log.json"
          node -e "
            const fs = require('fs');
            const log = fs.existsSync('$LOG_FILE')
              ? JSON.parse(fs.readFileSync('$LOG_FILE','utf8'))
              : {lastRun:'',sections:{}};
            log.lastRun = new Date().toISOString();
            const sections = (process.env.SECTIONS || '').split(',').filter(Boolean);
            for (const s of sections) log.sections[s] = {lastRun: log.lastRun, status: 'updated'};
            fs.writeFileSync('$LOG_FILE', JSON.stringify(log, null, 2));
          "
        env:
          SECTIONS: ${{ matrix.entry.type == 'update' && 'events,map-points,kpis,meta' || 'events,map-points,meta' }}

      - name: Collect metrics
        id: metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FILENAME=$(echo "$TIMESTAMP" | sed 's/:/-/g')
          TRACKER="${{ matrix.entry.tracker }}"
          TYPE="${{ matrix.entry.type }}"

          # Determine status from validation step
          if [ "${{ steps.validate-json.outcome || 'success' }}" = "failure" ]; then
            STATUS="failure"
          else
            STATUS="success"
          fi

          # Count trackers: 1 for this matrix entry
          TRACKER_COUNT=1

          mkdir -p public/_metrics/runs

          node -e "
            const fs = require('fs');
            const run = {
              timestamp: '$TIMESTAMP',
              status: '$STATUS',
              trigger: 'schedule',
              pipeline: 'hourly',
              trackersResolved: ['$TRACKER'],
              validation: {
                jsonValid: ${{ steps.validate-json.outcome != 'failure' || 'false' }},
                schemaValid: ${{ steps.validate-json.outcome != 'failure' || 'false' }},
                errors: [],
              },
              inventory: {},
            };
            fs.writeFileSync('public/_metrics/runs/${FILENAME}.json', JSON.stringify(run, null, 2));
            console.log('Wrote hourly metrics run file');

            const indexPath = 'public/_metrics/index.json';
            let index = [];
            try { index = JSON.parse(fs.readFileSync(indexPath, 'utf8')); } catch {}
            index.push({
              file: '${FILENAME}.json',
              timestamp: '$TIMESTAMP',
              status: '$STATUS',
              trackerCount: ${TRACKER_COUNT},
              errorCount: 0,
              pipeline: 'hourly',
            });
            const cutoff = new Date(Date.now() - 90 * 86400000).toISOString();
            const pruned = index.filter(e => e.timestamp >= cutoff);
            fs.writeFileSync(indexPath, JSON.stringify(pruned, null, 2));
            console.log('Index: ' + pruned.length + ' entries');
          "

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRACKER="${{ matrix.entry.tracker }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add "trackers/$TRACKER/" public/_hourly/ public/_social/ public/_metrics/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TYPE="${{ matrix.entry.type }}"
          if [ "$TYPE" = "new_tracker" ]; then
            MSG="feat(hourly): create tracker $TRACKER $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            MSG="chore(hourly): update $TRACKER $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          git commit -m "$MSG"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main; then
              git push && break
            else
              echo "Rebase conflict on attempt $i — resolving..."
              # Accept theirs for metrics (non-essential), ours for tracker data
              git diff --name-only --diff-filter=U | while read f; do
                if echo "$f" | grep -q "_metrics/"; then
                  git checkout --theirs "$f" && git add "$f"
                elif echo "$f" | grep -q "state.json"; then
                  git checkout --theirs "$f" && git add "$f"
                else
                  git checkout --ours "$f" && git add "$f"
                fi
              done
              git rebase --continue --no-edit || git rebase --abort
            fi
            sleep $((RANDOM % 5 + 2))
          done

      - name: Job summary
        if: always()
        run: |
          echo "## Hourly Pipeline — ${{ matrix.entry.tracker }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Type:** ${{ matrix.entry.type }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/tweet-text.txt ]; then
            echo "- **Tweet:** $(cat /tmp/tweet-text.txt)" >> "$GITHUB_STEP_SUMMARY"
          fi


  trigger-deploy:
    needs: act
    if: always() && needs.act.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy if breaking news was published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check recent commits from this workflow (last 5 to handle matrix concurrency)
          COMMITS=$(gh api repos/${{ github.repository }}/commits?per_page=5 --jq '.[].commit.message')
          if echo "$COMMITS" | grep -qE "^(chore|feat)\(hourly\):"; then
            echo "Hourly scan pushed changes — triggering deploy"
            gh workflow run deploy.yml --repo ${{ github.repository }} --ref main
          else
            echo "No hourly changes detected — skipping deploy trigger"
          fi
