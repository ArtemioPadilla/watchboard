name: Nightly Data Update

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:
    inputs:
      sections:
        description: 'Sections to update (comma-separated, or "all")'
        required: false
        default: 'all'
      tracker:
        description: 'Tracker slug to update (or "all" for every tracker)'
        required: false
        default: 'all'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TRACKER_SLUG: ${{ github.event.inputs.tracker || 'all' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update data with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the nightly data updater for the Intel Dashboard platform.

            Your job: search the web for the latest developments for each configured tracker
            and update the JSON data files in their respective trackers/*/data/ directories.

            INSTRUCTIONS:
            1. Read src/lib/schemas.ts to understand all data schemas
            2. Read scripts/update-data.ts to understand the update pipeline and merge-by-ID pattern
            3. List trackers/ to find all configured trackers
            4. For each tracker, read trackers/<slug>/tracker.json for its AI config (systemPrompt, searchContext, enabledSections)
            5. Read the current data files in trackers/<slug>/data/ to see existing entries
            6. Search the web for the latest developments (today and recent days)
            7. Update each enabled section following the exact schema shapes:
               - data/kpis.json (key metrics)
               - data/timeline.json (historical eras/phases)
               - data/events/*.json (daily event files, named YYYY-MM-DD.json)
               - data/map-points.json (geographic points of interest)
               - data/map-lines.json (strike/retaliation arcs with weapon data)
               - data/strike-targets.json (strike target details)
               - data/retaliation.json (retaliation actions)
               - data/assets.json (military assets)
               - data/casualties.json (casualty figures)
               - data/econ.json (economic indicators)
               - data/claims.json (claims from different parties)
               - data/political.json (political developments)
               - data/meta.json (last updated timestamp)

            RULES:
            - Use merge-by-ID: never remove existing entries, only add new or update existing
            - Every entry needs an `id` field (kebab-case, descriptive)
            - Tag sources with tier (1-4) and pole (western/middle_eastern/eastern/international)
            - Use OSINT confirmation: 1 Tier-1 or 2+ Tier-2 sources = confirmed
            - Validate coordinates are within theater bounds (see tracker.json ai.coordValidation)
            - Set `lastUpdated` on modified entries
            - Create new daily event file if today's doesn't exist
            - Casualty `contested` field: yes/no/evolving/heavily/partial
            - Update meta.json with current timestamp

            After updating, verify the changes by reading back modified files to confirm valid JSON.

            IMPORTANT: Do NOT commit or push changes. The workflow will handle validation, commit, and push after you finish.
          claude_args: "--max-turns 50 --dangerously-skip-permissions"

      - name: Check for changes
        id: changes
        run: |
          echo "=== Git status ==="
          git status --short trackers/
          git add trackers/
          echo "=== Staged changes ==="
          git diff --cached --name-only trackers/
          if git diff --cached --quiet trackers/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected, will commit"
          fi

      - name: Validate JSON syntax
        id: json_check
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "=== Validating JSON syntax ==="
          invalid=0
          for f in $(find trackers -name '*.json' -type f); do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "INVALID JSON: $f"
              invalid=$((invalid + 1))
            fi
          done
          if [ "$invalid" -gt 0 ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "$invalid JSON file(s) failed syntax validation — skipping commit"
          else
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "All JSON files have valid syntax"
          fi

      - name: Validate Zod schemas
        id: validate
        if: steps.changes.outputs.changed == 'true' && steps.json_check.outputs.valid == 'true'
        run: |
          echo "=== Validating data against Zod schemas ==="
          npx tsx -e "
          import { z } from 'zod';
          import * as S from './src/lib/schemas.js';
          import fs from 'fs';
          import path from 'path';

          const schemaMap: Record<string, z.ZodTypeAny> = {
            'kpis.json': z.array(S.KpiSchema),
            'timeline.json': z.array(S.TimelineEraSchema),
            'map-points.json': z.array(S.MapPointSchema),
            'map-lines.json': z.array(S.MapLineSchema),
            'strike-targets.json': z.array(S.StrikeItemSchema),
            'retaliation.json': z.array(S.StrikeItemSchema),
            'assets.json': z.array(S.AssetSchema),
            'casualties.json': z.array(S.CasualtyRowSchema),
            'econ.json': z.array(S.EconItemSchema),
            'claims.json': z.array(S.ClaimSchema),
            'political.json': z.array(S.PolItemSchema),
            'meta.json': S.MetaSchema,
          };
          const eventSchema = z.array(S.TimelineEventSchema);

          let failures = 0;

          // Find all tracker data directories
          const trackerDirs = fs.readdirSync('trackers', { withFileTypes: true })
            .filter(d => d.isDirectory())
            .map(d => path.join('trackers', d.name, 'data'));

          for (const dataDir of trackerDirs) {
            if (!fs.existsSync(dataDir)) continue;
            console.log('--- Checking', dataDir, '---');

            for (const [file, schema] of Object.entries(schemaMap)) {
              const fp = path.join(dataDir, file);
              if (!fs.existsSync(fp)) continue;
              const raw = JSON.parse(fs.readFileSync(fp, 'utf8'));
              const result = schema.safeParse(raw);
              if (result.success) {
                console.log('  ✓', file);
              } else {
                console.error('  ✗', file);
                for (const err of result.error.errors.slice(0, 3)) {
                  console.error('    ', err.path.join('.'), ':', err.message);
                }
                failures++;
              }
            }

            // Validate event partition files
            const eventsDir = path.join(dataDir, 'events');
            if (fs.existsSync(eventsDir)) {
              for (const ef of fs.readdirSync(eventsDir).filter(f => f.endsWith('.json'))) {
                const fp = path.join(eventsDir, ef);
                const raw = JSON.parse(fs.readFileSync(fp, 'utf8'));
                const result = eventSchema.safeParse(raw);
                if (result.success) {
                  console.log('  ✓ events/' + ef);
                } else {
                  console.error('  ✗ events/' + ef);
                  for (const err of result.error.errors.slice(0, 3)) {
                    console.error('    ', err.path.join('.'), ':', err.message);
                  }
                  failures++;
                }
              }
            }
          }

          if (failures > 0) {
            console.error(failures + ' file(s) failed Zod schema validation');
            process.exit(1);
          }
          console.log('All files pass Zod schema validation');
          "
          echo "valid=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' && steps.json_check.outputs.valid == 'true' && steps.validate.outputs.valid == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add trackers/
          SLUG="${TRACKER_SLUG:-all}"
          git commit -m "chore(data): nightly AI update ${SLUG} $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry up to 3 times in case remote has new commits
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
