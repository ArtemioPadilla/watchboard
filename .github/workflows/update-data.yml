name: Nightly Data Update

on:
  schedule:
    - cron: '0 14 * * *'  # 14:00 UTC daily
  workflow_dispatch:
    inputs:
      tracker_slug:
        description: 'Tracker slug to update, or "all" to check all eligible trackers'
        required: false
        default: 'all'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ── Phase 1: Resolve eligible trackers + generate shared context ──
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      slugs: ${{ steps.resolve.outputs.slugs }}
      slugs_json: ${{ steps.resolve.outputs.slugs_json }}
      has_trackers: ${{ steps.resolve.outputs.has_trackers }}
      hourly_updates: ${{ steps.hourly.outputs.hourly_updates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve eligible trackers
        id: resolve
        run: |
          MANUAL_SLUG="${{ github.event.inputs.tracker_slug || 'all' }}"

          if [ "$MANUAL_SLUG" != "all" ]; then
            echo "slugs=$MANUAL_SLUG" >> $GITHUB_OUTPUT
            echo "slugs_json=[\"$MANUAL_SLUG\"]" >> $GITHUB_OUTPUT
            echo "has_trackers=true" >> $GITHUB_OUTPUT
            echo "Manual trigger: $MANUAL_SLUG"
            exit 0
          fi

          SLUGS=""
          NOW_EPOCH=$(date +%s)
          for config in trackers/*/tracker.json; do
            DIR=$(dirname "$config")
            SLUG=$(basename "$DIR")
            LOG="$DIR/data/update-log.json"

            STATUS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$config','utf8')).status)")
            INTERVAL=$(node -e "
              const c = JSON.parse(require('fs').readFileSync('$config','utf8'));
              const policy = c.ai?.updatePolicy;
              if (policy) {
                let quietRuns = 0;
                try {
                  const log = JSON.parse(require('fs').readFileSync('$LOG','utf8'));
                  quietRuns = log.consecutiveQuietRuns || 0;
                } catch {}
                const esc = policy.escalation;
                const idx = Math.min(quietRuns, esc.length - 1);
                console.log(esc[idx]);
              } else {
                console.log(c.ai?.updateIntervalDays ?? 1);
              }
            ")

            [ "$STATUS" != "active" ] && continue

            if [ -f "$LOG" ]; then
              LAST_RUN=$(node -e "
                const log = JSON.parse(require('fs').readFileSync('$LOG','utf8'));
                console.log(log.lastRun || '');
              ")
              if [ -n "$LAST_RUN" ]; then
                LAST_EPOCH=$(date -d "$LAST_RUN" +%s 2>/dev/null || echo 0)
                ELAPSED_DAYS=$(( (NOW_EPOCH - LAST_EPOCH) / 86400 ))
                if [ "$ELAPSED_DAYS" -lt "$INTERVAL" ]; then
                  echo "Skipping $SLUG: updated ${ELAPSED_DAYS}d ago, interval is ${INTERVAL}d (escalation policy, last run: $LAST_RUN)"
                  continue
                fi
              fi
            fi

            SLUGS="$SLUGS $SLUG"
            echo "Eligible: $SLUG (interval: ${INTERVAL}d)"
          done

          SLUGS=$(echo "$SLUGS" | xargs)
          echo "slugs=$SLUGS" >> $GITHUB_OUTPUT

          if [ -z "$SLUGS" ]; then
            echo "has_trackers=false" >> $GITHUB_OUTPUT
            echo "slugs_json=[]" >> $GITHUB_OUTPUT
            echo "No trackers due for update"
          else
            echo "has_trackers=true" >> $GITHUB_OUTPUT
            SLUGS_JSON=$(echo "$SLUGS" | node -e "
              const s = require('fs').readFileSync(0,'utf8').trim();
              console.log(JSON.stringify(s.split(/\s+/)));
            ")
            echo "slugs_json=$SLUGS_JSON" >> $GITHUB_OUTPUT
            echo "Trackers to update: $SLUGS"
          fi

      - name: Generate sibling brief
        if: steps.resolve.outputs.has_trackers == 'true'
        run: npx tsx scripts/generate-sibling-brief.ts

      - name: Read hourly manifest for dedup
        id: hourly
        run: |
          MANIFEST="public/_hourly/today-updates.json"
          if [ -f "$MANIFEST" ]; then
            node -e "
              const manifest = JSON.parse(require('fs').readFileSync('$MANIFEST','utf8'));
              const today = new Date().toISOString().slice(0,10);
              if (manifest.date !== today) {
                console.log('hourly_updates={}');
                process.exit(0);
              }
              const byTracker = {};
              for (const u of manifest.updates) {
                if (!byTracker[u.tracker]) byTracker[u.tracker] = { eventIds: [], sections: [] };
                byTracker[u.tracker].eventIds.push(...u.eventIds);
                for (const s of u.sections) {
                  if (!byTracker[u.tracker].sections.includes(s)) byTracker[u.tracker].sections.push(s);
                }
              }
              console.log('hourly_updates=' + JSON.stringify(byTracker));
            " >> "$GITHUB_OUTPUT"
          else
            echo "hourly_updates={}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload sibling brief
        if: steps.resolve.outputs.has_trackers == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sibling-brief
          path: /tmp/sibling-brief.json
          retention-days: 1

  # ── Phase 2: Update each tracker in parallel ──
  update:
    needs: resolve
    if: needs.resolve.outputs.has_trackers == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        slug: ${{ fromJson(needs.resolve.outputs.slugs_json) }}
      max-parallel: 5
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download sibling brief
        uses: actions/download-artifact@v4
        with:
          name: sibling-brief
          path: /tmp/

      - name: Generate review manifest
        run: ELIGIBLE_SLUGS="${{ matrix.slug }}" npx tsx scripts/generate-review-manifest.ts

      - name: Build sibling context for prompt
        id: siblings
        run: |
          CONTEXT=$(node -e "
            const brief = JSON.parse(require('fs').readFileSync('/tmp/sibling-brief.json','utf8'));
            const slug = '${{ matrix.slug }}';
            const me = brief[slug];
            if (!me || !me.relatedSlugs.length) { console.log('No related trackers.'); process.exit(0); }
            const lines = me.relatedSlugs.map(s => {
              const r = brief[s];
              return r ? '- ' + s + ': ' + r.topic : null;
            }).filter(Boolean);
            console.log('SIBLING TRACKERS (do NOT duplicate their events):\n' + lines.join('\n'));
          ")
          echo "context<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update data with Claude Code
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            You are the nightly data updater for the Watchboard platform.
            Update ONLY this tracker: ${{ matrix.slug }}

            ${{ steps.siblings.outputs.context }}

            HOURLY DEDUP — The following events were already ingested today by the hourly pipeline. Do NOT re-add them:
            ${{ needs.resolve.outputs.hourly_updates || '{}' }}
            If sections listed were already updated hourly, focus your effort on OTHER sections not listed.

            Perform these steps:

            STEP 1 — UNDERSTAND SCHEMAS:
            Read src/lib/schemas.ts to understand all data schemas.

            STEP 2 — READ TRACKER CONFIG:
            Read trackers/${{ matrix.slug }}/tracker.json for:
            - ai.searchContext: what to search for
            - ai.enabledSections: which sections to update
            - ai.coordValidation: geographic bounds for map data

            STEP 2.5 — REVIEW EXISTING EVENTS:
            Read trackers/${{ matrix.slug }}/data/review-manifest.json (if it exists). For each day in the window:

            A) GAP DAYS (eventCount = 0):
               - Search for what happened on that date related to this tracker's topic
               - Use at least 2 different search strategies (topic search, actor search, region search)
               - Create event file only if you find real events with 2+ sources

            B) EXISTING DAYS (eventCount > 0):
               - Read the event file
               - Verify each event's date: is it actually from that day? If misplaced, move to correct day's file
               - Search for additional events that may have been missed

            C) BEFORE ADDING ANY EVENT:
               - Check +/-2 neighboring days' event files for duplicates (same incident reported on different dates)
               - Confirm the date via at least 2 independent sources
               - If date is uncertain, use the earliest confirmed report date

            STEP 3 — UPDATE ALL ENABLED SECTIONS:
            Read current data files, search the web for latest developments, update files
            in trackers/${{ matrix.slug }}/data/:
              - map-lines.json (HIGH PRIORITY — strike trajectories for 2D map + 3D globe)
              - map-points.json (HIGH PRIORITY — geographic points)
              - events/*.json (daily event files, YYYY-MM-DD.json)
              - kpis.json
              - casualties.json
              - econ.json
              - claims.json
              - political.json
              - strike-targets.json
              - retaliation.json
              - assets.json
              - timeline.json
              - meta.json
            Only update sections listed in the tracker's ai.enabledSections.
            You MUST update ALL enabled sections, not just events. Map-lines and map-points
            are CRITICAL — every military event needs a corresponding map entry with coordinates.

            MAP DATA IS HIGHEST PRIORITY — update map-lines.json FIRST:
            For each new military strike or retaliation event:
            - Add to map-lines.json: from/to coords, cat (strike/retaliation), weaponType, launched, intercepted, confidence, time (HH:MM), platform, status
            - weaponType values: ballistic, cruise, drone_loitering (Shahed/kamikaze drones), drone_ucav (armed UAVs like MQ-9), drone_recon (surveillance UAVs), drone_fpv (FPV quadcopters), rocket, mixed, unknown. Use 'drone_loitering' for generic/unspecified drones.
            - Add map-points.json entries for new locations
            - Validate coordinates within tracker's coordValidation bounds

            STEP 3.5 — EVENT MEDIA (MANDATORY for each new or updated event):
            Every event MUST have a `media` array with at least 1 item containing a thumbnail URL.
            For each event:
            - Search for a news article or image URL covering the event
            - Add media items: { "type": "image", "url": "<article-url>", "caption": "<brief description>", "source": "<outlet-name>", "thumbnail": "<direct-image-url>" }
            - ALWAYS search for and include a `thumbnail` URL (the direct og:image or photo URL from the article)
            - Prefer Tier 1-2 sources (Reuters, AP, BBC, CNN, Al Jazeera) for image reliability
            - The `url` field should be the article URL; `thumbnail` MUST be the direct image URL
            - If you absolutely cannot find any image after searching multiple sources, use the article URL as thumbnail
            - NEVER fabricate or guess image URLs — only use URLs you verified exist
            - Do NOT skip media — trackers without images look broken in the UI

            STEP 4 — UPDATE LOG:
            After updating, write trackers/${{ matrix.slug }}/data/update-log.json with:
            { "lastRun": "<current ISO timestamp>", "tracker": "${{ matrix.slug }}", "sections": { ... } }
            Mark sections as "updated" ONLY if you actually changed data in them.

            STEP 4.5 — ASSESS BREAKING STATUS:
            After updating data, evaluate whether this tracker is currently breaking news.
            Set "breaking": true in meta.json if the situation represents an ACUTE escalation,
            crisis, or major development — e.g. active military operations, humanitarian emergency,
            political crisis, or a significant new development that changes the story materially.
            Set "breaking": false (or remove the field) when activity has returned to the tracker's
            baseline level or the acute phase has passed. Use editorial judgment: not every update
            is breaking. A tracker with routine daily updates is NOT breaking. A tracker with a
            dramatic escalation, new front opening, or crisis-level event IS breaking.

            STEP 5 — GENERATE DIGEST (RSS feed):
            Prepend a digest entry to trackers/${{ matrix.slug }}/data/digests.json.
            Only list sections in sectionsUpdated that you ACTUALLY modified.
            {
              "date": "YYYY-MM-DD",
              "title": "{Tracker Name} Update — Mon DD, YYYY",
              "summary": "3-5 sentence summary of what changed.",
              "sectionsUpdated": ["only", "sections", "you", "actually", "changed"]
            }
            Keep only the latest 50 entries.

            CRITICAL — CONTENT ISOLATION:
            The heroHeadline, heroSubtitle, and digest summary MUST describe ONLY events
            from this tracker (${{ matrix.slug }}). NEVER include events, headlines, or
            developments from sibling trackers in these fields — even if they are thematically
            related. Sibling context is provided ONLY to avoid duplicating events that already
            appear in another tracker; it must never appear in your output text.

            RULES:
            - Merge-by-ID: never remove existing entries, only add new or update existing
            - Every entry needs an `id` field (kebab-case, descriptive)
            - Tag sources with tier (1-4) and pole (western/middle_eastern/eastern/international)
            - EVERY source MUST include a `url` field with the direct article URL. This is MANDATORY, not optional.
            - The URL should be the actual article you read, not a generic homepage (e.g., https://www.reuters.com/world/... not https://www.reuters.com/)
            - If you cite 'Reuters' as a source, you MUST have the specific Reuters article URL
            - If you cannot find a specific article URL for a source, search for it — do not leave url empty
            - Sources without URLs are considered unverified and reduce tracker quality
            - OSINT confirmation: 1 Tier-1 or 2+ Tier-2 sources = confirmed
            - BACKFILL: Check for missing days between latest event file and today, create event files for each gap day
            - Update meta.json lastUpdated with the EXACT current UTC time (use new Date().toISOString()), NOT a rounded or hardcoded time like "06:00:00Z"

            SCHEMA ENFORCEMENT (validation failures block the commit — follow these EXACTLY):
            - Every event MUST have a `year` field as a STRING (e.g. "2026", NOT 2026). This is the #1 failure cause.
            - source `pole` MUST be one of: "western", "middle_eastern", "eastern", "international". No other values.
            - econ.json `direction` MUST be "up" or "down" only. NEVER "stable".
            - ALL dates MUST NOT be in the future. Never use a date after today.
            - map-lines with cat "strike" or "retaliation" MUST have BOTH `weaponType` AND `time` fields. These are REQUIRED for strike/retaliation lines.
            - map-lines `weaponType` MUST be one of: "ballistic", "cruise", "drone", "drone_loitering", "drone_ucav", "drone_recon", "drone_fpv", "rocket", "mixed", "unknown". NEVER free-text like "airstrike".
            - map-lines `launched` and `intercepted` MUST be numbers (count), NOT booleans.
            - map-lines `status` MUST be one of: "hit", "intercepted", "partial", "unknown".
            - event `media` items MUST have `type` ("image", "video", or "article"), `url` (string), and `thumbnail` (string — direct image URL, NOT an article URL). `caption` and `source` are optional strings.
            - `thumbnail` is REQUIRED for type "image" — it must be a direct URL to an image file (containing .jpg, .jpeg, .png, .webp, or from a known image CDN like dims.apnews.com, d3i6fh83elv35t.cloudfront.net, etc.)

            After updating, verify changes by reading back modified files to confirm valid JSON.

            IMPORTANT: Do NOT commit or push. The workflow handles that.
          claude_args: "--max-turns 30 --dangerously-skip-permissions"  # Reduced from 50 to save Claude Code budget

      - name: Upload tracker changes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-${{ matrix.slug }}
          path: trackers/${{ matrix.slug }}/data/
          retention-days: 1
          if-no-files-found: ignore

  # ── Phase 3: Validate, fix, commit, and collect metrics ──
  finalize:
    needs: [resolve, update]
    if: always()
    runs-on: ubuntu-latest
    # 20 min was hitting the wall — Astro build (95 trackers, ~6800 pages) is
    # ~10-15 min on its own, then social-queue generation adds 1-3 min. Giving
    # 45 min of headroom so the rare slow run doesn't get killed mid-push.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all tracker artifacts
        if: needs.resolve.outputs.has_trackers == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: tracker-*
          path: /tmp/artifacts/

      - name: Apply tracker changes
        if: needs.resolve.outputs.has_trackers == 'true'
        id: apply
        run: |
          CHANGED=false
          for dir in /tmp/artifacts/tracker-*; do
            [ ! -d "$dir" ] && continue
            SLUG=${dir##*/tracker-}
            echo "Applying changes for: $SLUG"
            cp -r "$dir/"* "trackers/$SLUG/data/"
            CHANGED=true
          done
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Update adaptive frequency state
        if: needs.resolve.outputs.has_trackers == 'true'
        run: |
          for dir in /tmp/artifacts/tracker-*; do
            [ ! -d "$dir" ] && continue
            SLUG=${dir##*/tracker-}
            LOG="trackers/$SLUG/data/update-log.json"
            CONFIG="trackers/$SLUG/tracker.json"
            [ ! -f "$LOG" ] || [ ! -f "$CONFIG" ] && continue

            node -e "
              const fs = require('fs');
              const config = JSON.parse(fs.readFileSync('$CONFIG', 'utf8'));
              const log = JSON.parse(fs.readFileSync('$LOG', 'utf8'));
              const threshold = config.ai?.updatePolicy?.quietThreshold ?? 0;

              const EXCLUDED = new Set(['meta']);
              const updatedCount = Object.entries(log.sections || {}).filter(([key, v]) => {
                if (EXCLUDED.has(key)) return false;
                const status = typeof v === 'string' ? v : v?.status;
                return status === 'updated';
              }).length;

              if (updatedCount > threshold) {
                log.consecutiveQuietRuns = 0;
              } else {
                log.consecutiveQuietRuns = (log.consecutiveQuietRuns || 0) + 1;
              }

              fs.writeFileSync('$LOG', JSON.stringify(log, null, 2) + '\n');
              const esc = config.ai?.updatePolicy?.escalation;
              const idx = esc ? Math.min(log.consecutiveQuietRuns, esc.length - 1) : -1;
              const nextInterval = esc ? esc[idx] : (config.ai?.updateIntervalDays ?? 1);
              console.log(
                '$SLUG: updatedSections=' + updatedCount +
                ', quietRuns=' + log.consecutiveQuietRuns +
                ', nextInterval=' + nextInterval + 'd'
              );
            "
          done

      - name: Check for changes
        id: changes
        if: steps.apply.outputs.changed == 'true'
        run: |
          git add trackers/
          if git diff --cached --quiet trackers/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No actual changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Validate JSON syntax
        id: json_check
        if: steps.changes.outputs.changed == 'true'
        run: |
          invalid=0
          for f in $(find trackers -name '*.json' -path '*/data/*' -type f ! -name 'review-manifest.json'); do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "INVALID JSON: $f"
              invalid=$((invalid + 1))
            fi
          done
          if [ "$invalid" -gt 0 ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
          else
            echo "valid=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate Zod schemas
        id: validate
        if: steps.changes.outputs.changed == 'true' && steps.json_check.outputs.valid == 'true'
        run: |
          npx tsx -e "
          import { z } from 'zod';
          import * as S from './src/lib/schemas.js';
          import fs from 'fs';
          import path from 'path';

          const schemaMap: Record<string, z.ZodTypeAny> = {
            'kpis.json': z.array(S.KpiSchema),
            'timeline.json': z.array(S.TimelineEraSchema),
            'map-points.json': z.array(S.MapPointSchema),
            'map-lines.json': z.array(S.MapLineSchema),
            'strike-targets.json': z.array(S.StrikeItemSchema),
            'retaliation.json': z.array(S.StrikeItemSchema),
            'assets.json': z.array(S.AssetSchema),
            'casualties.json': z.array(S.CasualtyRowSchema),
            'econ.json': z.array(S.EconItemSchema),
            'claims.json': z.array(S.ClaimSchema),
            'political.json': z.array(S.PolItemSchema),
            'meta.json': S.MetaSchema,
            'digests.json': z.array(S.DigestEntrySchema),
          };
          const eventSchema = z.array(S.TimelineEventSchema);

          let failures = 0;
          const errors: Array<{tracker: string, file: string, field: string, message: string}> = [];

          for (const slug of fs.readdirSync('trackers')) {
            const dataDir = path.join('trackers', slug, 'data');
            if (!fs.existsSync(dataDir) || !fs.statSync(dataDir).isDirectory()) continue;

            console.log('--- Checking', slug, '---');
            for (const [file, schema] of Object.entries(schemaMap)) {
              const fp = path.join(dataDir, file);
              if (!fs.existsSync(fp)) continue;
              const raw = JSON.parse(fs.readFileSync(fp, 'utf8'));
              const result = schema.safeParse(raw);
              if (result.success) {
                console.log('  ✓', file);
              } else {
                console.error('  ✗', file);
                for (const err of result.error.errors.slice(0, 5)) {
                  const field = err.path.join('.');
                  console.error('    ', field, ':', err.message);
                  errors.push({ tracker: slug, file, field, message: err.message });
                }
                failures++;
              }
            }

            const eventsDir = path.join(dataDir, 'events');
            if (fs.existsSync(eventsDir)) {
              for (const ef of fs.readdirSync(eventsDir).filter(f => f.endsWith('.json'))) {
                const fp = path.join(eventsDir, ef);
                const raw = JSON.parse(fs.readFileSync(fp, 'utf8'));
                const result = eventSchema.safeParse(raw);
                if (result.success) {
                  console.log('  ✓ events/' + ef);
                } else {
                  console.error('  ✗ events/' + ef);
                  for (const err of result.error.errors.slice(0, 5)) {
                    errors.push({ tracker: slug, file: 'events/' + ef, field: err.path.join('.'), message: err.message });
                  }
                  failures++;
                }
              }
            }
          }

          fs.writeFileSync('/tmp/zod-errors.json', JSON.stringify(errors, null, 2));
          fs.writeFileSync('/tmp/zod-error-count.txt', String(failures));

          if (failures > 0) {
            console.error(failures + ' file(s) failed Zod schema validation');
            process.exit(1);
          }
          console.log('All files pass Zod schema validation');
          " 2>&1 || true

          if [ -f /tmp/zod-error-count.txt ]; then
            ERROR_COUNT=$(cat /tmp/zod-error-count.txt)
          else
            ERROR_COUNT=0
          fi

          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT
            ERRORS=$(cat /tmp/zod-errors.json | head -c 65000)
            echo "errors<<ERRORS_EOF" >> $GITHUB_OUTPUT
            echo "$ERRORS" >> $GITHUB_OUTPUT
            echo "ERRORS_EOF" >> $GITHUB_OUTPUT
          else
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "error_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Fix validation errors
        id: fix_agent
        if: steps.validate.outputs.valid == 'false' && steps.changes.outputs.changed == 'true'
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            You are a schema fix agent for the Watchboard platform.
            The nightly data update produced files that fail Zod validation.
            Fix the reported errors AND scan each affected file for other
            instances of the same pattern.

            Do NOT add new data. Do NOT search the web. Do NOT remove entries.

            VALIDATION ERRORS:
            ${{ steps.validate.outputs.errors }}

            STEP 1 — Read src/lib/schemas.ts to understand the exact Zod schemas.

            STEP 2 — For each error, read the file and fix the specific field.

            STEP 3 — Scan the ENTIRE file for other entries with the same mistake:

            TYPE COERCIONS: year: 2026→"2026", launched/intercepted: true→number, tier: "1"→1
            INVALID ENUMS: pole→"western"|"middle_eastern"|"eastern"|"international",
              direction→"up"|"down", status→"hit"|"intercepted"|"partial"|"unknown",
              weaponType→schema enum values ("airstrike"→"mixed", "drone"→"drone_loitering")
            MISSING FIELDS: event missing year→derive from filename, missing id→generate from title,
              missing sources→[], source missing tier→4
            STRUCTURAL: object instead of array→wrap, sparkData <2 points→pad

            STEP 4 — Write corrected files. Verify valid JSON.

            Do NOT commit. Do NOT modify files that already pass validation.
          claude_args: "--max-turns 15 --dangerously-skip-permissions"

      - name: Re-validate after fix
        id: revalidate
        if: steps.fix_agent.outcome == 'success' && steps.validate.outputs.valid == 'false'
        run: |
          git add trackers/
          npx tsx -e "
          import { z } from 'zod';
          import * as S from './src/lib/schemas.js';
          import fs from 'fs';
          import path from 'path';

          const schemaMap: Record<string, z.ZodTypeAny> = {
            'kpis.json': z.array(S.KpiSchema),
            'timeline.json': z.array(S.TimelineEraSchema),
            'map-points.json': z.array(S.MapPointSchema),
            'map-lines.json': z.array(S.MapLineSchema),
            'strike-targets.json': z.array(S.StrikeItemSchema),
            'retaliation.json': z.array(S.StrikeItemSchema),
            'assets.json': z.array(S.AssetSchema),
            'casualties.json': z.array(S.CasualtyRowSchema),
            'econ.json': z.array(S.EconItemSchema),
            'claims.json': z.array(S.ClaimSchema),
            'political.json': z.array(S.PolItemSchema),
            'meta.json': S.MetaSchema,
            'digests.json': z.array(S.DigestEntrySchema),
          };
          const eventSchema = z.array(S.TimelineEventSchema);
          let failures = 0;
          const errors: Array<{tracker:string,file:string,field:string,message:string}> = [];
          for (const slug of fs.readdirSync('trackers')) {
            const dataDir = path.join('trackers', slug, 'data');
            if (!fs.existsSync(dataDir) || !fs.statSync(dataDir).isDirectory()) continue;
            for (const [file, schema] of Object.entries(schemaMap)) {
              const fp = path.join(dataDir, file);
              if (!fs.existsSync(fp)) continue;
              const result = schema.safeParse(JSON.parse(fs.readFileSync(fp, 'utf8')));
              if (!result.success) { result.error.errors.slice(0,5).forEach(e => errors.push({tracker:slug,file,field:e.path.join('.'),message:e.message})); failures++; }
            }
            const eventsDir = path.join(dataDir, 'events');
            if (fs.existsSync(eventsDir)) {
              for (const ef of fs.readdirSync(eventsDir).filter(f => f.endsWith('.json'))) {
                const result = eventSchema.safeParse(JSON.parse(fs.readFileSync(path.join(eventsDir,ef),'utf8')));
                if (!result.success) { result.error.errors.slice(0,5).forEach(e => errors.push({tracker:slug,file:'events/'+ef,field:e.path.join('.'),message:e.message})); failures++; }
              }
            }
          }
          fs.writeFileSync('/tmp/zod-errors-after-fix.json', JSON.stringify(errors, null, 2));
          fs.writeFileSync('/tmp/zod-error-count-after-fix.txt', String(failures));
          if (failures > 0) { console.error(failures + ' still failing'); process.exit(1); }
          console.log('All pass after fix');
          " 2>&1 || true
          AFTER=$(cat /tmp/zod-error-count-after-fix.txt 2>/dev/null || echo 0)
          echo "valid=$( [ \"$AFTER\" -eq 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "error_count=$AFTER" >> $GITHUB_OUTPUT

      - name: Build gate (catch runtime errors Zod misses)
        id: build_check
        if: |
          steps.changes.outputs.changed == 'true' && (
            steps.validate.outputs.valid == 'true' ||
            steps.revalidate.outputs.valid == 'true'
          )
        run: |
          npm run build 2>&1 | tail -20
          echo "build_ok=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Validate media URLs
        id: media_check
        if: steps.build_check.outputs.build_ok == 'true'
        continue-on-error: true
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const https = require('https');
          const http = require('http');

          const IMAGE_EXTENSIONS = /\.(jpg|jpeg|png|webp|gif|svg|avif)(\?|$)/i;
          const IMAGE_CDNS = [
            'dims.apnews.com', 'd3i6fh83elv35t.cloudfront.net', 'ichef.bbci.co.uk',
            'static01.nyt.com', 'cdn.cnn.com', 'img.reuters.com', 's.yimg.com',
            'i.guim.co.uk', 'media.npr.org', 'image.cnbcfm.com',
            'cloudfront-us-east-2.images.arcpublishing.com',
          ];

          function looksLikeImage(url) {
            if (!url) return false;
            if (IMAGE_EXTENSIONS.test(url)) return true;
            try {
              const host = new URL(url).hostname;
              return IMAGE_CDNS.some(cdn => host.includes(cdn));
            } catch { return false; }
          }

          async function headCheck(url, timeout = 5000) {
            return new Promise((resolve) => {
              const mod = url.startsWith('https') ? https : http;
              const req = mod.request(url, { method: 'HEAD', timeout }, (res) => {
                resolve({ url, status: res.statusCode, ok: res.statusCode < 400 });
              });
              req.on('error', () => resolve({ url, status: 0, ok: false }));
              req.on('timeout', () => { req.destroy(); resolve({ url, status: 0, ok: false }); });
              req.end();
            });
          }

          async function main() {
            let totalEvents = 0;
            let eventsWithMedia = 0;
            let eventsWithoutMedia = 0;
            let mediaWithThumb = 0;
            let mediaWithoutThumb = 0;
            let thumbLooksImage = 0;
            let thumbLooksArticle = 0;

            const urlsToCheck = [];

            for (const slug of fs.readdirSync('trackers')) {
              const evDir = path.join('trackers', slug, 'data', 'events');
              if (!fs.existsSync(evDir)) continue;
              for (const f of fs.readdirSync(evDir).filter(f => f.endsWith('.json'))) {
                let events;
                try { events = JSON.parse(fs.readFileSync(path.join(evDir, f), 'utf8')); } catch { continue; }
                if (!Array.isArray(events)) continue;
                for (const ev of events) {
                  totalEvents++;
                  if (!ev.media || !Array.isArray(ev.media) || ev.media.length === 0) {
                    eventsWithoutMedia++;
                    continue;
                  }
                  eventsWithMedia++;
                  for (const m of ev.media) {
                    if (m.thumbnail) {
                      mediaWithThumb++;
                      if (looksLikeImage(m.thumbnail)) {
                        thumbLooksImage++;
                      } else {
                        thumbLooksArticle++;
                      }
                      urlsToCheck.push({ slug, event: ev.id, url: m.thumbnail, field: 'thumbnail' });
                    } else {
                      mediaWithoutThumb++;
                      if (m.url && m.type === 'image') {
                        urlsToCheck.push({ slug, event: ev.id, url: m.url, field: 'url' });
                      }
                    }
                  }
                }
              }
            }

            // Print audit summary
            const pctMedia = totalEvents > 0 ? Math.round(eventsWithMedia / totalEvents * 100) : 0;
            console.log('');
            console.log('Media audit:');
            console.log('  Total events scanned: ' + totalEvents);
            console.log('  Events with media: ' + eventsWithMedia + ' (' + pctMedia + '%)');
            console.log('  Events WITHOUT media: ' + eventsWithoutMedia + (eventsWithoutMedia > 0 ? ' ⚠️' : ''));
            console.log('  Media items with thumbnail: ' + mediaWithThumb);
            console.log('  Media items WITHOUT thumbnail: ' + mediaWithoutThumb + (mediaWithoutThumb > 0 ? ' ⚠️' : ''));
            console.log('  Thumbnails that look like images: ' + thumbLooksImage + ' ✓');
            console.log('  Thumbnails that look like articles: ' + thumbLooksArticle + (thumbLooksArticle > 0 ? ' ⚠️' : ''));

            // HEAD-check URLs
            if (urlsToCheck.length === 0) { console.log('  No media URLs to HEAD-check'); return; }
            console.log('');
            console.log('HEAD-checking ' + urlsToCheck.length + ' media URLs...');

            let ok = 0, broken = 0;
            const failures = [];
            for (const entry of urlsToCheck) {
              const result = await headCheck(entry.url);
              if (result.ok) { ok++; }
              else { broken++; failures.push(entry.slug + '/' + entry.event + ': ' + entry.url + ' (' + result.status + ')'); }
            }
            console.log('  Reachable: ' + ok + ' ✓');
            console.log('  Broken URLs: ' + broken + (broken > 0 ? ' ⚠️' : ''));
            if (failures.length > 0) {
              console.warn('');
              console.warn('Broken media URLs (non-blocking):');
              failures.slice(0, 20).forEach(f => console.warn('  ' + f));
              if (failures.length > 20) console.warn('  ... and ' + (failures.length - 20) + ' more');
            }
          }
          main();
          "

      - name: Audit source URLs
        if: steps.build_check.outputs.build_ok == 'true'
        continue-on-error: true
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          let totalSources = 0;
          let sourcesWithUrl = 0;
          for (const slug of fs.readdirSync('trackers')) {
            const evDir = path.join('trackers', slug, 'data', 'events');
            if (!fs.existsSync(evDir)) continue;
            for (const f of fs.readdirSync(evDir).filter(f => f.endsWith('.json'))) {
              let events;
              try { events = JSON.parse(fs.readFileSync(path.join(evDir, f), 'utf8')); } catch { continue; }
              if (!Array.isArray(events)) continue;
              for (const ev of events) {
                for (const s of ev.sources || []) {
                  totalSources++;
                  if (s.url) sourcesWithUrl++;
                }
              }
            }
          }
          const pct = totalSources > 0 ? Math.round(sourcesWithUrl * 100 / totalSources) : 0;
          console.log('');
          console.log('Source URL audit:');
          console.log('  Sources with URL: ' + sourcesWithUrl + '/' + totalSources + ' (' + pct + '%)');
          if (pct < 50) console.warn('  ⚠️ Source URL coverage below 50% — consider backfilling');
          else console.log('  ✓ Coverage acceptable');
          "

      - name: Backfill missing digests
        if: |
          steps.build_check.outputs.build_ok == 'true'
        run: npx tsx scripts/ensure-digests.ts

      - name: Commit and push data
        if: |
          steps.build_check.outputs.build_ok == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add trackers/
          git commit -m "chore(data): nightly AI update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          pushed=false
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              pushed=true
              break
            fi
            echo "Push attempt $i failed, retrying..."
            git rebase --abort || true
            git reset --hard HEAD
            sleep 2
          done
          if [ "$pushed" != "true" ]; then
            echo "Failed to push nightly data commit after 3 attempts"
            exit 1
          fi

      - name: Collect metrics
        id: metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FILENAME=$(echo "$TIMESTAMP" | sed 's/:/-/g')

          if [ "${{ steps.validate.outputs.valid }}" = "true" ] || [ "${{ steps.revalidate.outputs.valid }}" = "true" ]; then
            STATUS="success"
          else
            STATUS="failure"
          fi

          TRIGGER="${{ github.event_name == 'schedule' && 'schedule' || 'workflow_dispatch' }}"

          ERRORS="[]"
          [ -f /tmp/zod-errors.json ] && ERRORS=$(cat /tmp/zod-errors.json)

          FIX_INVOKED="false"
          FIX_RESULT="null"
          ERRORS_BEFORE="null"
          ERRORS_AFTER="null"
          if [ "${{ steps.fix_agent.outcome }}" = "success" ] || [ "${{ steps.fix_agent.outcome }}" = "failure" ]; then
            FIX_INVOKED="true"
            [ "${{ steps.revalidate.outputs.valid }}" = "true" ] && FIX_RESULT='"success"' || FIX_RESULT='"failure"'
            ERRORS_BEFORE="${{ steps.validate.outputs.error_count || 0 }}"
            ERRORS_AFTER="${{ steps.revalidate.outputs.error_count || 0 }}"
          fi

          INVENTORY="{"
          FIRST=true
          for dir in trackers/*/data; do
            SLUG=$(basename $(dirname "$dir"))
            [ ! -d "$dir" ] && continue
            KPI=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/kpis.json','utf8')).length)}catch{console.log(0)}")
            TL=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/timeline.json','utf8')).length)}catch{console.log(0)}")
            MP=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/map-points.json','utf8')).length)}catch{console.log(0)}")
            ML=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/map-lines.json','utf8')).length)}catch{console.log(0)}")
            CL=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/claims.json','utf8')).length)}catch{console.log(0)}")
            PO=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/political.json','utf8')).length)}catch{console.log(0)}")
            CA=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/casualties.json','utf8')).length)}catch{console.log(0)}")
            EV=0
            [ -d "$dir/events" ] && EV=$(ls "$dir/events/"*.json 2>/dev/null | wc -l | xargs)
            [ "$FIRST" = true ] && FIRST=false || INVENTORY="$INVENTORY,"
            INVENTORY="$INVENTORY\"$SLUG\":{\"kpis\":$KPI,\"timeline\":$TL,\"mapPoints\":$MP,\"mapLines\":$ML,\"claims\":$CL,\"political\":$PO,\"casualties\":$CA,\"events\":$EV}"
          done
          INVENTORY="$INVENTORY}"

          SLUGS_JSON=$(echo '${{ needs.resolve.outputs.slugs || '' }}' | node -e "
            const s = require('fs').readFileSync(0,'utf8').trim();
            console.log(JSON.stringify(s ? s.split(/\s+/) : []));
          ")

          node -e "
            const run = {
              timestamp: '$TIMESTAMP',
              status: '$STATUS',
              trigger: '$TRIGGER',
              pipeline: 'nightly',
              trackersResolved: $SLUGS_JSON,
              validation: {
                jsonValid: ${{ steps.json_check.outputs.valid == 'true' || 'false' }},
                schemaValid: ${{ steps.validate.outputs.valid == 'true' || 'false' }},
                errors: $ERRORS,
                ...(${FIX_INVOKED} ? {
                  fixAgentInvoked: true,
                  fixAgentResult: ${FIX_RESULT},
                  errorsBeforeFix: ${ERRORS_BEFORE},
                  errorsAfterFix: ${ERRORS_AFTER},
                } : {}),
              },
              inventory: $INVENTORY,
            };
            require('fs').writeFileSync('public/_metrics/runs/${FILENAME}.json', JSON.stringify(run, null, 2));
            console.log('Wrote metrics run file');

            const indexPath = 'public/_metrics/index.json';
            let index = [];
            try { index = JSON.parse(require('fs').readFileSync(indexPath, 'utf8')); } catch {}
            index.push({
              file: '${FILENAME}.json',
              timestamp: '$TIMESTAMP',
              status: '$STATUS',
              trackerCount: $SLUGS_JSON.length,
              errorCount: $ERRORS.length,
              pipeline: 'nightly',
            });
            const cutoff = new Date(Date.now() - 90 * 86400000).toISOString();
            const pruned = index.filter(e => e.timestamp >= cutoff);
            require('fs').writeFileSync(indexPath, JSON.stringify(pruned, null, 2));
            console.log('Index: ' + pruned.length + ' entries');
          "

      - name: Build social queue prompt
        id: social_prompt
        if: steps.build_check.outputs.build_ok == 'true'
        run: |
          npx tsx scripts/generate-social-queue.ts --dry-run
          if [ -f "public/_social/prompt-latest.txt" ]; then
            echo "has_prompt=true" >> $GITHUB_OUTPUT
          else
            echo "has_prompt=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate social queue via Claude
        id: social
        if: steps.social_prompt.outputs.has_prompt == 'true'
        uses: anthropics/claude-code-action@main
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          # timeout_minutes is not a valid input for this action; the
          # job-level timeout-minutes (above) bounds the run instead.
          prompt: |
            Read the file public/_social/prompt-latest.txt — it contains a complete prompt for generating a social media queue.

            Execute the instructions in that prompt. It will ask you to output a JSON array of tweet entries.

            Write ONLY the JSON array (no markdown fences, no explanation) to the file:
              public/_social/raw-queue.json

            The file must contain a valid JSON array of objects. Nothing else.

      - name: Post-process social queue
        if: steps.social.outcome == 'success'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RAW="public/_social/raw-queue.json"

          # Claude agent might write to raw-queue.json, or YYYY-MM-DD.json, or queue-YYYY-MM-DD.json
          # Find whichever file it actually wrote
          if [ ! -f "$RAW" ]; then
            # Check for date-named file without queue- prefix
            for f in public/_social/${TODAY}.json public/_social/queue-${TODAY}.json; do
              if [ -f "$f" ]; then
                echo "Found queue at $f, moving to $RAW"
                mv "$f" "$RAW"
                break
              fi
            done
          fi

          if [ ! -f "$RAW" ]; then
            echo "No raw queue file found — skipping post-processing"
            exit 0
          fi

          # Validate JSON
          if ! node -e "JSON.parse(require('fs').readFileSync('$RAW','utf8'))"; then
            echo "Invalid JSON in $RAW — skipping"
            rm -f "$RAW"
            exit 0
          fi

          # Post-process: filter, fix fields, assign statuses, write correct filename
          node -e "
            const fs = require('fs');
            const crypto = require('crypto');
            const today = '${TODAY}';
            const slots = ['08:00','13:00','18:00','22:00'];
            let queue = JSON.parse(fs.readFileSync('$RAW', 'utf8'));

            // Filter out non-Twitter entries (LinkedIn, etc.)
            const before = queue.length;
            queue = queue.filter(e => !e.platform || e.platform === 'twitter' || e.platform === 'x');
            if (queue.length < before) console.log('Filtered out ' + (before - queue.length) + ' non-Twitter entries');

            let slotIdx = 0;
            for (const entry of queue) {
              // Normalize legacy field names
              if (!entry.tracker && entry.trackerSlug) {
                entry.tracker = entry.trackerSlug;
              }
              delete entry.trackerSlug;
              delete entry.trackerName;
              delete entry.platform;

              // Required fields
              if (!entry.id) entry.id = crypto.randomUUID();
              if (entry.tweetId === undefined) entry.tweetId = null;
              if (entry.postedAt === undefined) entry.postedAt = null;

              // Fix missing publishAt — assign to next available slot
              if (!entry.publishAt || isNaN(new Date(entry.publishAt).getTime())) {
                entry.publishAt = today + 'T' + slots[slotIdx % slots.length] + ':00Z';
                slotIdx++;
              }

              // Strip link and hashtags from text if agent included them (poster appends these)
              if (entry.link && entry.text.includes(entry.link)) {
                entry.text = entry.text.replace(entry.link, '').replace(/\n{2,}/g, '\n\n').trim();
              }
              if (entry.hashtags && Array.isArray(entry.hashtags)) {
                // Normalize: ensure all hashtags have # prefix
                entry.hashtags = entry.hashtags.map(tag => tag.startsWith('#') ? tag : '#' + tag);
                // Strip hashtags from text if agent included them (poster appends these)
                for (const hashTag of entry.hashtags) {
                  entry.text = entry.text.replace(new RegExp('\\\\s*' + hashTag.replace(/[.*+?^\${}()|[\\]\\\\]/g, '\\\\\\$&') + '\\\\s*', 'g'), ' ').trim();
                }
              }

              // Status from judge, or default
              if (!entry.status) {
                const j = entry.judge;
                // Reject if any fact check failed
                if (j && j.factChecks && j.factChecks.some(fc => fc.status === 'failed')) {
                  entry.status = 'rejected';
                } else if (j && j.verdict === 'KILL') {
                  entry.status = 'rejected';
                } else if (j && j.verdict === 'HOLD') {
                  entry.status = 'held';
                } else if (j && j.verdict === 'REVIEW') {
                  entry.status = 'pending_review';
                } else if (entry.type === 'meme') {
                  // Memes always require review
                  entry.status = 'pending_review';
                } else if (j && j.score >= 0.85 && j.verdict === 'PUBLISH') {
                  entry.status = 'auto_approved';
                } else if (j && j.score >= 0.5) {
                  entry.status = 'pending_review';
                } else if (!j) {
                  // No judge at all — auto-approve non-meme
                  entry.status = 'auto_approved';
                } else {
                  entry.status = 'rejected';
                }
              }

              if (!entry.estimatedCost) {
                entry.estimatedCost = entry.image || entry.memegenUrl ? 0.02 : 0.01;
              }
            }
            const outPath = 'public/_social/queue-' + today + '.json';
            fs.writeFileSync(outPath, JSON.stringify(queue, null, 2));
            const approved = queue.filter(e => e.status === 'auto_approved').length;
            const review = queue.filter(e => e.status === 'pending_review').length;
            console.log('Wrote ' + queue.length + ' entries (' + approved + ' auto_approved, ' + review + ' pending_review) to ' + outPath);
          "

          # Clean up raw file
          rm -f "$RAW"

      - name: Commit and push metrics
        if: always() && steps.metrics.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/_metrics/ public/_social/
          if git diff --cached --quiet public/_metrics/ public/_social/; then
            echo "No metrics changes"
            exit 0
          fi
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          STATUS="${{ steps.validate.outputs.valid == 'true' && 'success' || (steps.revalidate.outputs.valid == 'true' && 'success' || 'failure') }}"
          git commit -m "chore(metrics): ingestion run $TIMESTAMP [$STATUS]"
          pushed=false
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              pushed=true
              break
            fi
            echo "Push attempt $i failed, retrying..."
            git rebase --abort || true
            git reset --hard HEAD
            sleep 2
          done
          if [ "$pushed" != "true" ]; then
            echo "Failed to push nightly metrics commit after 3 attempts"
            exit 1
          fi

      - name: Clean up old hourly manifests
        run: |
          ARCHIVE_DIR="public/_hourly/archive"
          if [ -d "$ARCHIVE_DIR" ]; then
            find "$ARCHIVE_DIR" -name "*.json" -mtime +3 -delete 2>/dev/null || true
            echo "Pruned hourly archives older than 3 days"
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## Nightly Data Update Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Trackers resolved**: ${{ needs.resolve.outputs.slugs || 'none' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Changes detected**: ${{ steps.changes.outputs.changed || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "**JSON valid**: ${{ steps.json_check.outputs.valid || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Schema valid**: ${{ steps.validate.outputs.valid || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Fix agent**: ${{ steps.fix_agent.outcome || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Valid after fix**: ${{ steps.revalidate.outputs.valid || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Data Inventory" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tracker | KPIs | Timeline | Map Pts | Map Lines | Claims | Political | Casualties |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|----------|---------|-----------|--------|-----------|------------|" >> $GITHUB_STEP_SUMMARY
          for dir in trackers/*/data; do
            SLUG=$(basename $(dirname "$dir"))
            [ ! -d "$dir" ] && continue
            KPI=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/kpis.json','utf8')).length)}catch{console.log(0)}")
            TL=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/timeline.json','utf8')).length)}catch{console.log(0)}")
            MP=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/map-points.json','utf8')).length)}catch{console.log(0)}")
            ML=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/map-lines.json','utf8')).length)}catch{console.log(0)}")
            CL=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/claims.json','utf8')).length)}catch{console.log(0)}")
            PO=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/political.json','utf8')).length)}catch{console.log(0)}")
            CA=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$dir/casualties.json','utf8')).length)}catch{console.log(0)}")
            echo "| $SLUG | $KPI | $TL | $MP | $ML | $CL | $PO | $CA |" >> $GITHUB_STEP_SUMMARY
          done

  # ── Phase 4: Notify on failure ──
  notify-failure:
    needs: [resolve, update, finalize]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Create failure issue (if not already open)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          TITLE="⚠️ Nightly Data Update failed — $TODAY"
          PREFIX="⚠️ Nightly Data Update failed"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Check if an open issue with this prefix already exists
          EXISTING=$(curl --fail-with-body -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&per_page=100" \
            | node -e "
              const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
              const prefix = process.env.PREFIX;
              const match = data.find(item => !item.pull_request && item.title.startsWith(prefix));
              console.log(match ? match.number : '');
            ")

          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING already exists — adding comment instead"
            curl --fail-with-body -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$EXISTING/comments" \
              -d "$(node -e "console.log(JSON.stringify({body: 'Failed again on $TODAY.\\n\\nRun: $RUN_URL'}))")"
          else
            echo "Creating new failure issue"
            curl --fail-with-body -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues" \
              -d "$(node -e "console.log(JSON.stringify({
                title: '$TITLE',
                body: 'The Nightly Data Update workflow failed on $TODAY.\\n\\n**Run:** $RUN_URL\\n\\nDigests may be stale. The deploy workflow will use \`ensure-digests.ts\` as a fallback, but the root cause should be investigated.',
                labels: ['bug', 'automation']
              }))")"
          fi
