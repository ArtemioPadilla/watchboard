name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Nightly Data Update"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # When triggered by workflow_run (nightly update), only deploy if it succeeded.
    # Push events (including hourly-scan commits) and workflow_dispatch always pass
    # this condition because event_name is 'push' or 'workflow_dispatch', not
    # 'workflow_run', so the first clause is true and the || short-circuits.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Backfill missing digests
        run: npx tsx scripts/ensure-digests.ts

      - name: Build Astro site
        env:
          PUBLIC_POSTHOG_KEY: phc_CtJ5gPA3KykaauRYyqjkjq3ELJrBeJWxeKFoZkFNHwuw
          PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
        run: npm run build

      - name: Generate health status
        run: npx tsx scripts/generate-health.ts

      - name: Copy health status into build output
        run: |
          mkdir -p dist/_health
          cp public/_health/status.json dist/_health/status.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Notify Telegram on build/deploy failure ──
  notify-failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Telegram failure alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN/CHAT_ID missing; skipping Telegram alert"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          FAILED=""
          [ "$BUILD_RESULT" = "failure" ] && FAILED="$FAILED build"
          [ "$DEPLOY_RESULT" = "failure" ] && FAILED="$FAILED deploy"
          FAILED=$(echo "$FAILED" | xargs)
          [ -z "$FAILED" ] && FAILED="unknown"
          TEXT=$(printf '🚨 Pages Deploy FAILED\nJob(s): %s\nSHA: %s\n%s' "$FAILED" "$SHA_SHORT" "$RUN_URL")
          PAYLOAD=$(jq -n --arg c "$TELEGRAM_CHAT_ID" --arg t "$TEXT" \
            '{chat_id: $c, text: $t, disable_web_page_preview: false}')
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "Telegram post failed (non-blocking)"
