name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Nightly Data Update"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # When triggered by workflow_run (nightly update), only deploy if it succeeded.
    # Push events (including hourly-scan commits) and workflow_dispatch always pass
    # this condition because event_name is 'push' or 'workflow_dispatch', not
    # 'workflow_run', so the first clause is true and the || short-circuits.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Backfill missing digests
        run: npx tsx scripts/ensure-digests.ts

      - name: Build Astro site
        env:
          PUBLIC_POSTHOG_KEY: phc_CtJ5gPA3KykaauRYyqjkjq3ELJrBeJWxeKFoZkFNHwuw
          PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
        run: npm run build

      - name: Generate health status
        run: npx tsx scripts/generate-health.ts

      - name: Copy health status into build output
        run: |
          mkdir -p dist/_health
          cp public/_health/status.json dist/_health/status.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
